<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Página não encontrada — FutStory</title>
<meta name="theme-color" content="#07090F"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#07090F;color:#EEF2FF;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(circle at 30% 20%,rgba(0,240,130,.08) 0%,transparent 50%)}
.box{text-align:center;max-width:400px}
.ball{font-size:80px;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.code{font-size:72px;font-weight:900;background:linear-gradient(135deg,#00F082,#FFBE00);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin-bottom:8px}
.msg{font-size:20px;font-weight:800;margin-bottom:12px}
.sub{color:#A0AECB;font-size:14px;margin-bottom:28px;line-height:1.5}
.btn{display:inline-block;background:#00F082;color:#07090F;padding:14px 28px;border-radius:99px;font-weight:900;font-size:15px;text-decoration:none;transition:transform .15s}
.btn:active{transform:scale(.96)}
.logo{margin-top:36px;font-size:15px;font-weight:800}
.logo .g{color:#00F082}.logo .o{color:#FFBE00}
</style>
</head>
<body>
<div class="box">
  <div class="ball">⚽</div>
  <div class="code">404</div>
  <div class="msg">Driblou demais e se perdeu!</div>
  <div class="sub">Essa página não existe ou o link está quebrado. Volta pra casa e continua jogando.</div>
  <a href="/arenahub/" class="btn">🏠 Voltar ao FutStory</a>
  <div class="logo"><span class="g">Fut</span><span class="o">Story</span></div>
</div>
</body>
</html>
