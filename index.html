      o += '<div style="display:flex;flex-direction:column;align-items:center;flex:1">';
      o += '<div style="font-size:20px;margin-bottom:4px">'+p.medal+'</div>';
      o += '<div style="width:'+(p.rank===1?'60px':'48px')+';height:'+(p.rank===1?'60px':'48px')+';border-radius:50%;border:3px solid '+p.cor+';overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--surf)">'+avHtml+'</div>';
      o += '<div style="font-weight:700;font-size:11px;margin-top:5px;text-align:center;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.j.nome.split(' ')[0])+'</div>';
      o += '<div style="color:'+p.cor+';font-weight:900;font-size:13px">'+pts+' pts</div>';
      o += '<div style="width:100%;height:'+p.h+'px;background:linear-gradient(180deg,'+p.cor+'40,'+p.cor+'18);border:1px solid '+p.cor+'44;border-bottom:none;border-radius:8px 8px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:6px;font-size:20px">'+['🥇','🥈','🥉'][p.rank-1]+'</div>';
      o += '</div>';
    });
    o += '</div>';
  }

  // Lista completa
  o += '<div class="card" style="padding:6px 0">';
  lista.forEach(function(j, i){
    var pts = S.rankAba==='gols'?(j.gols||0)
            : S.rankAba==='assist'?(j.assist||0)
            : S.rankAba==='seguidos'?(j.seg||0)
            : ((j.gols||0)*2+(j.assist||0)+(j.seg||0));
    var unid = S.rankAba==='gols'?'gols'
             : S.rankAba==='assist'?'assist'
             : S.rankAba==='seguidos'?'seguidores'
             :'pts';
    var cor = i===0?'#FFBE00':i===1?'#A8B5CC':i===2?'#FF7043':'var(--muted)';
    var medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'º';
    var isMeu = S.fbUser && j.uid === S.fbUser.uid;
    var avHtml = j.fotoUrl
      ? '<div style="width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid '+(isMeu?'var(--green)':'var(--bord)')+'"><img src="'+j.fotoUrl+'" style="width:100%;height:100%;object-fit:cover"></div>'
      : '<div style="width:38px;height:38px;border-radius:50%;background:var(--surf);border:2px solid '+(isMeu?'var(--green)':'var(--bord)')+';display:flex;align-items:center;justify-content:center;font-size:18px">'+( j.av||'🧑')+'</div>';

    o += '<div onclick="openJogador(\'' + j.uid + '\')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:'+(isMeu?'rgba(0,240,130,.05)':'transparent')+';border-bottom:1px solid var(--bord)">';
    o += '<span style="font-size:14px;width:26px;text-align:center;color:'+cor+';font-weight:800">'+medal+'</span>';
    o += avHtml;
    o += '<div style="flex:1;min-width:0">';
    o += '<div style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px">'+esc(j.nome)+(isMeu?'<span style="font-size:9px;background:var(--green);color:var(--bg);border-radius:99px;padding:1px 6px">você</span>':'')+'</div>';
    o += '<div style="color:var(--muted);font-size:11px;margin-top:1px">'+( j.pos||'MEI')+' · '+(j.nivel||'Iniciante')+'</div>';
    o += '</div>';
    o += '<div style="text-align:right;flex-shrink:0">';
    o += '<div style="color:'+cor+';font-weight:900;font-size:16px">'+pts+'</div>';
    o += '<div style="color:var(--muted);font-size:10px">'+unid+'</div>';
    o += '</div>';
    o += '</div>';
  });
  o += '</div>';
  o += '</div>';
  return o;
}

  var o = '<div class="fu" style="padding:0 14px">';

    o += '<div class="scard"><div style="color:' + s.c + ';font-weight:900;font-size:15px">' + s.v + '</div><div class="slbl">' + s.l + '</div></div>';

    o += '<div style="display:flex;align-items:center;gap:11px;margin-bottom:9px">';

    o += pl(sLbl[r.status], cor) + '</div>';
    o += '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:9px;border-top:1px solid var(--bord)">';
    o += '<div style="display:flex;gap:14px"><span style="font-size:12px;color:var(--muted)">💰 R$ ' + r.preco + '</span><span style="font-size:12px;color:var(--muted)">👥 ' + r.jog + ' jogadores</span></div>';
    o += '<span style="font-size:12px;color:var(--muted)">R$ ' + (r.preco/r.jog).toFixed(2) + '/jog.</span></div>';
    if (r.status === 'realizada') {
      o += '<button class="btn bs bsm" style="width:100%;margin-top:9px" onclick="toast(\'Reserva repetida! 📅\')">🔁 Repetir reserva</button>';
    } else if (r.status === 'confirmada') {
      o += '<div style="display:flex;gap:7px;margin-top:9px">';
      o += '<button class="btn bs bsm" style="flex:1" onclick="toast(\'Link copiado! 🔗\')">📤 Compartilhar</button>';
      o += '<button class="btn bd bsm" style="flex:1" onclick="toast(\'Reserva cancelada.\')">Cancelar</button></div>';
    }

/* ── RATING INTERATIVO DE CAMPO ─────────────────── */
function openRatingCampo(campoId) {
  var c = null;
  for (var i = 0; i < D.campos.length; i++) { if (D.campos[i].id === campoId) { c = D.campos[i]; break; } }
  if (!c) return;
  S.ratingCampo = S.ratingCampo || {};
  var nota = S.ratingCampo[campoId] || 0;
  var criterios = ['Gramado','Limpeza','Infraestrutura','Atendimento','Custo-benefício'];
  var notas = S.ratingCampo['c'+campoId] || criterios.map(function(){return 0;});
  var o = '<div style="font-weight:800;font-size:16px;margin:0 0 5px">⭐ Avaliar ' + esc(c.nome) + '</div>';
  o += '<div style="color:var(--muted);font-size:12px;margin-bottom:16px">Compartilhe sua experiência com outros jogadores</div>';
  criterios.forEach(function(crit, ci) {
    o += '<div style="margin-bottom:13px"><div style="font-size:13px;font-weight:700;margin-bottom:7px">' + crit + '</div>';
    o += '<div style="display:flex;gap:7px">';
    for (var n = 1; n <= 5; n++) {
      var filled = n <= (notas[ci] || 0);
      o += '<button onclick="ratingSetCrit(' + campoId + ',' + ci + ',' + n + ')" style="width:36px;height:36px;border-radius:9px;font-size:20px;cursor:pointer;border:1.5px solid ' + (filled?c.cor:'var(--bord)') + ';background:' + (filled?c.cor+'22':'var(--surf)') + '">★</button>';
    }
    o += '</div></div>';
  });
  o += dv();
  o += '<div style="display:flex;gap:9px">';
  o += '<button class="btn bs" style="flex:1" onclick="closeModal()">Cancelar</button>';
  o += '<button class="btn bp" style="flex:1" onclick="closeModal();toast(\'Avaliação enviada! ⭐\')">Enviar avaliação</button></div>';
  showModal(o);
}
function ratingSetCrit(campoId, ci, nota) {
  if (!S.ratingCampo) S.ratingCampo = {};
  if (!S.ratingCampo['c'+campoId]) S.ratingCampo['c'+campoId] = [0,0,0,0,0];
  S.ratingCampo['c'+campoId][ci] = nota;
  openRatingCampo(campoId);
}

/* ── COMENTÁRIOS EXPANDIDOS ─────────────────────── */
// Comentários em memória (cache local)
var _comentariosCache = {};

function openComments(postId) {
  S.comentando = postId;
  var comments = _comentariosCache[postId] || [];

  // Carrega do Firestore se disponível
  if(_fbDb && !_comentariosCache[postId]){
    _fbDb.collection('posts').doc(postId).collection('comentarios')
      .orderBy('timestamp','asc').limit(50)
      .get().then(function(snap){
        var cms = [];
        snap.forEach(function(doc){
          var d = doc.data();
          d.id = doc.id;
          cms.push(d);
        });
        _comentariosCache[postId] = cms;
        openComments(postId); // re-abre com dados
      }).catch(function(){});
  }

  var o = '<div style="font-weight:800;font-size:16px;margin:0 0 16px">💬 Comentários</div>';
  if(comments.length === 0){
    o += '<div class="empty" style="padding:20px 0;color:var(--muted)">Sem comentários ainda. Seja o primeiro! 💬</div>';
  } else {
    comments.forEach(function(cm){
      var avHtml = (cm.avatarTipo==='foto'&&cm.av&&cm.av.startsWith('data:'))
        ? '<div style="width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0"><img src="'+cm.av+'" style="width:100%;height:100%;object-fit:cover"></div>'
        : av(cm.av||'🧑', 34);
      o += '<div style="display:flex;gap:9px;margin-bottom:13px">';
      o += avHtml;
      o += '<div style="flex:1;background:var(--surf);border-radius:0 13px 13px 13px;padding:9px 12px">';
      o += '<div style="font-weight:700;font-size:12px;margin-bottom:3px">'+esc(cm.user)+'<span style="color:var(--muted);font-weight:400;margin-left:7px">'+( cm.hora||'agora')+'</span></div>';
      o += '<div style="font-size:13px;line-height:1.5">'+esc(cm.txt)+'</div></div></div>';
    });
  }
  o += dv();
  o += '<div style="display:flex;gap:8px"><input id="cmt-inp" class="fi" style="flex:1;padding:9px 13px" placeholder="Adicionar comentário...">';
  o += '<button class="btn bp bsm" onclick="sendComment(\'' + postId + '\')">Enviar</button></div>';
  showModal(o);
  setTimeout(function(){
    var el = document.getElementById('cmt-inp');
    if(el) el.addEventListener('keydown', function(e){ if(e.key==='Enter') sendComment(postId); });
  }, 50);
}

function sendComment(postId) {
  var inp = document.getElementById('cmt-inp');
  if(!inp || !inp.value.trim()) return;
  var txt = inp.value.trim();
  inp.value = '';

  var novoComent = {
    av: S.perfFotoUrl||S.perfAv||'🧑',
    avatarTipo: S.perfFotoUrl?'foto':'emoji',
    user: S.perfNome||'Usuário',
    txt: txt,
    hora: 'agora',
    uid: S.fbUser?S.fbUser.uid:''
  };

  // Adiciona no cache local imediatamente para resposta rápida
  if(!_comentariosCache[postId]) _comentariosCache[postId]=[];
  _comentariosCache[postId].push(novoComent);
  openComments(postId);

  // Salva no Firestore usando batch — garante que comentário e contador
  // são atualizados juntos atomicamente, sem atraso entre os dois
  if(_fbDb){
    var batch = _fbDb.batch();
    var comentRef = _fbDb.collection('posts').doc(postId).collection('comentarios').doc();
    var postRef = _fbDb.collection('posts').doc(postId);
    var data = Object.assign({}, novoComent);
    data.timestamp = firebase.firestore.FieldValue.serverTimestamp();
    batch.set(comentRef, data);
    batch.update(postRef, {coments: firebase.firestore.FieldValue.increment(1)});
    batch.commit().then(function(){
      // Notifica o dono do post
      var post=D.feed.filter(function(p){return p.id===postId;})[0];
      if(post&&post.uid&&post.uid!==S.fbUser.uid){
        _enviarNotificacao(post.uid,'comentario',S.perfNome+' comentou na sua publicação 💬',S.fbUser.uid,'comentario');
      }
    }).catch(function(err){
      toast('Erro ao comentar: ' + err.message);
      // Remove do cache se falhou
      if(_comentariosCache[postId]){
        _comentariosCache[postId].pop();
      }
    });
    // O onSnapshot do feed vai atualizar o contador automaticamente
  }
}
