<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#07090F;--bg2:#0C0F1A;--surf:#111520;--card:#151B28;--cardhi:#1C2438;--bord:#1E2D45;--green:#00F082;--gold:#FFBE00;--orange:#FF7043;--red:#FF4060;--blue:#4D9EFF;--purple:#B06EFF;--teal:#00D4C8;--pink:#FF4D8D;--text:#EEF2FF;--text2:#A0AECB;--muted:#4E6080;--muted2:#2A3A52;--greenglow:rgba(0,240,130,.14);}
html.light{--bg:#F4F6FA;--bg2:#EAECF2;--surf:#FFFFFF;--card:#FFFFFF;--cardhi:#F0F2F8;--bord:#D8DCE8;--text:#111827;--text2:#4B5563;--muted:#9CA3AF;--muted2:#D1D5DB;--greenglow:rgba(0,180,100,.1);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow-x:hidden;max-width:480px;margin:0 auto;min-height:100vh;}
*{-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;}
input,textarea,select{color:var(--text);background:var(--surf);}
::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .25s ease forwards} .fu:has(#mapa-campos){animation:none;transform:none}
.su{animation:slideUp .3s ease forwards}
#topbar{position:sticky;top:0;z-index:200;background:rgba(7,9,15,.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--bord);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;min-height:54px;}
.logo{display:flex;align-items:center;gap:8px;}.logo-ic{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-tx{font-weight:900;font-size:19px;letter-spacing:-.5px;}.logo-tx .g{color:var(--green);}.logo-tx .o{color:var(--gold);}
.tb-acts{display:flex;gap:4px;align-items:center;}
.ib{width:36px;height:36px;border-radius:9px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;position:relative;cursor:pointer;}
.ib:active{background:var(--card);}
.nb{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:99px;font-size:9px;font-weight:900;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--bg);}
#screen{min-height:calc(100vh - 54px);padding-bottom:72px;overflow-x:hidden;}
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:200;background:rgba(7,9,15,.96);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-top:1px solid var(--bord);display:flex;padding:4px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));}
.nbi{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;cursor:pointer;}
.nbi-ic{width:38px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;transition:background .15s;}
.nbi-ic.a{background:rgba(0,240,130,.15);}
.nbi-lb{font-size:10px;font-weight:500;color:var(--muted);}
.nbi-lb.a{font-weight:800;color:var(--green);}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center;}
.msh{width:100%;max-width:480px;background:var(--surf);border-radius:22px 22px 0 0;padding:18px 18px max(36px,calc(env(safe-area-inset-bottom)+18px));border-top:1px solid var(--bord);max-height:90vh;overflow-y:auto;}
.mhd{width:34px;height:4px;background:var(--bord);border-radius:99px;margin:0 auto 18px;}
.card{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:14px;}
.card.tap:active{background:var(--cardhi);}
.card.glow{box-shadow:0 0 24px rgba(0,240,130,.12);border-color:#2E4268;}
.btn{border:none;border-radius:12px;font-weight:800;font-size:13px;padding:10px 18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;-webkit-user-select:none;user-select:none;}
.btn:active{opacity:.8;transform:scale(.97);}
.bp{background:var(--green);color:var(--bg);}.bs{background:transparent;color:var(--text);border:1px solid var(--bord);}
.bd{background:var(--red);color:#fff;}.bb{background:var(--blue);color:#fff;}
.bsm{padding:7px 13px;font-size:12px;border-radius:10px;}.blg{padding:13px 22px;font-size:15px;}.bfw{width:100%;}
.pl{display:inline-flex;align-items:center;border-radius:99px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;}
.fl{color:var(--muted);font-size:11px;display:block;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;}
.fi{width:100%;background:var(--surf);border:1.5px solid var(--bord);border-radius:11px;padding:10px 13px;font-size:13px;color:var(--text);box-sizing:border-box;transition:border-color .2s;-webkit-appearance:none;}
.fi:focus{border-color:var(--green);}
.fg{margin-bottom:13px;}
hr.dv{border:none;border-top:1px solid var(--bord);margin:11px 0;}
.hero{margin:12px 0;border-radius:20px;background:linear-gradient(155deg,#0C1F3A 0%,#07090F 70%);padding:22px 18px;position:relative;overflow:hidden;border:1px solid rgba(77,158,255,.18);}
.hero-bg{position:absolute;right:-20px;top:-20px;font-size:120px;opacity:.04;transform:rotate(-15deg);pointer-events:none;}
.hero h2{color:var(--text);font-size:23px;font-weight:900;line-height:1.15;margin:9px 0 5px;}
.grad-tx{background:linear-gradient(135deg,var(--green),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{color:var(--text2);font-size:13px;margin:0 0 16px;line-height:1.5;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:20px;}
.scard{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:10px 5px;text-align:center;}
.sval{font-weight:900;font-size:16px;margin:3px 0 2px;}.slbl{color:var(--muted);font-size:10px;}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.stl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;}
.sa{background:none;border:none;color:var(--green);font-size:12px;font-weight:700;cursor:pointer;}
.sr{display:flex;gap:9px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.ri{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--card);border:1px solid var(--bord);border-radius:15px;margin-bottom:8px;}
.ri.tap:active{background:var(--cardhi);}
.stor-row{display:flex;gap:11px;overflow-x:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;}
.stor{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;}
.stor-ring{padding:2.5px;border-radius:50%;}
.stor-av{width:56px;height:56px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--bg);}
.stor-lb{font-size:10px;color:var(--text2);max-width:60px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Story viewer */
.story-viewer{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;background:#000;z-index:9999;display:flex;flex-direction:column;}
.story-progress-bar{display:flex;gap:3px;padding:10px 10px 6px;position:absolute;top:0;left:0;right:0;z-index:2;}
.story-prog-seg{flex:1;height:3px;background:rgba(255,255,255,.35);border-radius:99px;overflow:hidden;}
.story-prog-fill{height:100%;background:#fff;border-radius:99px;transition:width linear;}
.story-media{width:100%;height:100%;object-fit:cover;}
.story-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;}
.story-header{padding:44px 14px 10px;display:flex;align-items:center;gap:9px;}
.story-footer{padding:14px;}
.ftabs{display:flex;gap:7px;overflow-x:auto;padding:0 14px 12px;border-bottom:1px solid var(--bord);-webkit-overflow-scrolling:touch;}
.ftab{flex-shrink:0;border-radius:99px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bord);background:var(--card);color:var(--text2);}
.ftab.a{background:var(--green);color:var(--bg);border-color:var(--green);}
.post{border-bottom:1px solid var(--bord);padding:14px 14px 0;}
.post-hd{display:flex;gap:9px;align-items:flex-start;margin-bottom:10px;}
.post-name{font-weight:800;font-size:14px;}.post-meta{color:var(--muted);font-size:11px;margin-top:2px;}
.post-txt{font-size:14px;line-height:1.6;margin:0 0 10px;}
.post-vid{border-radius:14px;overflow:hidden;margin-bottom:10px;background:var(--surf);border:1px solid var(--bord);position:relative;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.play-ic{width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;font-size:20px;position:absolute;}
.vid-dur{position:absolute;bottom:7px;right:9px;background:rgba(0,0,0,.75);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;}
.vid-views{position:absolute;bottom:7px;left:9px;background:rgba(0,0,0,.6);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--text2);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;border-radius:14px;overflow:hidden;margin-bottom:10px;}
.pcell{aspect-ratio:1/1;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;}
.pmore{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;}
.pacts{display:flex;align-items:center;border-top:1px solid var(--bord);margin:0 -14px;}
.pa{background:none;border:none;display:flex;align-items:center;gap:4px;padding:10px 9px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.pa .pi{font-size:16px;}.pa:active{opacity:.7;}
.cbox{padding:10px 0 13px;}.crow{display:flex;gap:9px;align-items:center;}
.cinput{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:99px;padding:8px 13px;font-size:13px;color:var(--text);}
.csend{background:var(--green);border:none;border-radius:99px;padding:8px 13px;color:var(--bg);font-weight:800;font-size:12px;cursor:pointer;}
.ptyps{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.ptyp{border-radius:99px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bord);background:var(--card);color:var(--text2);}
.ptyp.a{background:var(--green);color:var(--bg);border-color:var(--green);}
.ptxt{width:100%;background:var(--card);border:1.5px solid var(--bord);border-radius:12px;padding:11px 13px;font-size:14px;color:var(--text);resize:none;height:95px;margin-bottom:13px;box-sizing:border-box;}
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.ubox{border:2px dashed var(--bord);border-radius:13px;padding:16px 10px;text-align:center;cursor:pointer;}
.ubox:active{border-color:var(--green);}
.cgal{border-radius:18px;overflow:hidden;margin-bottom:13px;position:relative;aspect-ratio:16/9;background:var(--surf);border:1px solid var(--bord);}
.cgal-main{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:68px;}
.gdots{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.gdot{height:7px;border-radius:99px;cursor:pointer;transition:all .25s;}
.gnav{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:15px;cursor:pointer;}
.ctabs{display:flex;gap:5px;margin-bottom:13px;}
.ctab{flex:1;border-radius:9px;padding:7px 0;font-size:11px;font-weight:800;cursor:pointer;border:1px solid var(--bord);background:var(--card);color:var(--text2);}
.ftgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:11px;}
.fth{aspect-ratio:1/1;border-radius:9px;background:var(--surf);border:2px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
.fth.a{border-color:var(--green);}
.vli{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bord);}
.vlt{width:68px;height:48px;border-radius:9px;background:var(--surf);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;cursor:pointer;}
.vlp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.hor{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:13px;background:var(--card);border:1.5px solid var(--bord);margin-bottom:7px;cursor:pointer;}
.hor.sel{background:rgba(0,240,130,.1);border-color:var(--green);}
.hor.occ{opacity:.4;cursor:not-allowed;}
.hor:not(.occ):active{background:var(--cardhi);}
.dvbox{text-align:center;margin-top:13px;padding:15px;background:rgba(0,240,130,.1);border-radius:13px;border:1px solid rgba(0,240,130,.22);}
.popt{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:13px;margin-bottom:7px;cursor:pointer;border:1.5px solid var(--bord);background:var(--surf);}
.popt.a{background:rgba(0,240,130,.1);border-color:var(--green);}
.popt:active{opacity:.8;}
.thero{border-radius:20px;padding:22px;text-align:center;margin-bottom:14px;}
.atabs{display:flex;gap:5px;margin-bottom:13px;}
.atab{flex:1;border-radius:11px;padding:9px 0;font-size:16px;cursor:pointer;border:1px solid var(--bord);background:var(--card);color:var(--text2);}
.chat-a{height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:11px;padding:3px 0;-webkit-overflow-scrolling:touch;}
.cr{display:flex;gap:7px;align-items:flex-end;}.cr.me{flex-direction:row-reverse;}
.cb{max-width:74%;border-radius:14px;padding:9px 12px;font-size:13px;line-height:1.4;}
.cb.ot{background:var(--surf);color:var(--text);border-radius:14px 14px 14px 3px;}
.cb.me{background:linear-gradient(135deg,var(--green),var(--teal));color:var(--bg);border-radius:14px 14px 3px 14px;}
.ct{font-size:10px;color:var(--muted);margin-top:2px;}
.cs{font-size:10px;color:var(--muted);margin-bottom:2px;padding-left:3px;}
.chat-ir{display:flex;gap:7px;}
.chat-in{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:13px;padding:10px 13px;font-size:13px;color:var(--text);}
.chat-sn{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--green),var(--teal));border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cnf{padding:55px 22px 80px;text-align:center;}
.cnf-em{font-size:76px;margin-bottom:14px;animation:pulse 2s infinite;}
.cnf-ti{font-weight:900;font-size:24px;margin-bottom:7px;background:linear-gradient(135deg,var(--green),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.kc{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:14px;}
.bch{display:flex;gap:3px;align-items:flex-end;height:86px;}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bw{width:100%;height:60px;display:flex;align-items:flex-end;}
.bb2{width:100%;border-radius:3px 3px 0 0;min-height:3px;}
.pbar{width:100%;background:var(--surf);border-radius:99px;height:4px;}
.pfil{height:4px;border-radius:99px;transition:width .4s;}
.bbtn{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--bord);color:var(--text);border-radius:11px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:14px;}
.bbtn:active{opacity:.8;}
.mini-gal{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;border-radius:13px;overflow:hidden;margin-bottom:11px;}
.mg-c{aspect-ratio:1/1;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:19px;}
.stars{display:inline-flex;align-items:center;gap:1px;}
.star-r{display:flex;justify-content:center;gap:9px;margin-bottom:13px;}
.star-big{font-size:36px;cursor:pointer;color:var(--muted2);transition:all .15s;}
.star-big.on{color:var(--gold);transform:scale(1.12);}
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:13px;}
.ps-card{background:var(--card);border:1px solid var(--bord);border-radius:13px;padding:11px;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--bord);border-radius:20px;padding:24px;}
.login-tabs{display:flex;gap:5px;margin-bottom:22px;}
.login-tab{flex:1;padding:9px 0;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;border:none;}
.login-tab.a{background:var(--green);color:var(--bg);}
.login-tab:not(.a){background:var(--surf);color:var(--muted);}
.login-tab:active{opacity:.8;}
.login-err{background:rgba(255,64,96,.12);border:1px solid rgba(255,64,96,.3);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--red);margin-bottom:13px;}
.login-soc{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px;}
.login-soc-btn{padding:10px 0;border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bord);background:var(--surf);color:var(--text);display:flex;align-items:center;justify-content:center;gap:5px;}
.login-soc-btn:active{background:var(--cardhi);}
.login-div{display:flex;align-items:center;gap:10px;margin:16px 0;}
.login-div-line{flex:1;height:1px;background:var(--bord);}
.login-div-txt{color:var(--muted);font-size:11px;font-weight:600;}
.msg-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--bord);cursor:pointer;}
.msg-item:active{background:var(--cardhi);}
.msg-name{font-weight:700;font-size:14px;}
.msg-prev{color:var(--muted);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.msg-badge{background:var(--green);color:var(--bg);border-radius:99px;font-size:10px;font-weight:900;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.msg-chat-a{overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:10px;-webkit-overflow-scrolling:touch;flex:1;min-height:200px;max-height:calc(100vh - 240px);}
.msg-chat-bar{padding:10px 0 0;border-top:1px solid var(--bord);display:flex;gap:8px;}
.msg-chat-in{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:13px;padding:10px 13px;font-size:14px;color:var(--text);}
.msg-chat-sn{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--green),var(--teal));border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.torn-card{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;}
.torn-card:active{background:var(--cardhi);}
.torn-prog{height:5px;background:var(--surf);border-radius:99px;overflow:hidden;margin-top:8px;}
.torn-prog-fill{height:100%;border-radius:99px;}
.mapa-bg{height:200px;display:flex;align-items:center;justify-content:center;position:relative;background:linear-gradient(135deg,#0C1A2E,#0A1520);border-radius:16px;overflow:hidden;margin-bottom:13px;border:1px solid var(--bord);}
.mapa-grid{position:absolute;inset:0;opacity:.12;background-image:linear-gradient(rgba(77,158,255,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(77,158,255,.4) 1px,transparent 1px);background-size:28px 28px;}
.mapa-pin{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.mapa-pin-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.mapa-pin-lb{font-size:9px;font-weight:800;margin-top:2px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap;}
.av-opt{width:44px;height:44px;border-radius:50%;background:var(--surf);border:2px solid var(--bord);font-size:21px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.av-opt.sel{border-color:var(--green);background:rgba(0,240,130,.12);}
.av-opt:active{opacity:.8;}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--text);border-radius:99px;padding:9px 20px;font-size:13px;font-weight:700;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);}
#toast.show{opacity:1;}
.empty{text-align:center;padding:32px 0;color:var(--muted);font-size:13px;}
.promo-c{border-radius:14px;padding:14px;}
/* BRACKET */
.bracket-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
.bracket{display:flex;gap:12px;padding:2px;}
.bracket-col{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.brt{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:4px;letter-spacing:.5px;}
.bm{background:var(--surf);border:1.5px solid var(--bord);border-radius:10px;padding:7px 10px;min-width:115px;}
.bm-t{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px;}
.bm-t+.bm-t{border-top:1px solid var(--bord);}
.bm-t.el{opacity:.35;}
.bm-sc{font-weight:900;font-size:13px;margin-left:6px;}
/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:6px;margin:16px 0 20px;}
.pod-slot{display:flex;flex-direction:column;align-items:center;gap:4px;}
.pod-bar{border-radius:10px 10px 0 0;width:84px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.pod-nm{font-size:11px;font-weight:700;text-align:center;max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pod-pt{font-size:10px;}
/* CONQUISTAS */
.bdg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.bdg{text-align:center;}
.bdg-ic{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 4px;border:2px solid;}
@keyframes bdg-glow{0%,100%{box-shadow:0 0 6px currentColor}50%{box-shadow:0 0 18px currentColor}}
.bdg-ic.on{animation:bdg-glow 2.5s infinite;}
.bdg-ic.off{filter:grayscale(1);opacity:.28;}
.bdg-lb{font-size:10px;font-weight:700;color:var(--text2);}
/* TOGGLE SWITCH */
.tog{width:46px;height:26px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s;}
.tog-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">
    <div class="logo-ic">⚽</div>
    <div class="logo-tx"><span class="g">Arena</span><span class="o">Hub</span></div>
  </div>
  <div class="tb-acts">
    <button class="ib" onclick="toggleSearch()" aria-label="Buscar">🔍</button>
    <button class="ib" id="dm-btn" onclick="toggleDark()" aria-label="Tema">🌙</button>
    <button class="ib" onclick="go('mensagens')" aria-label="Mensagens" style="position:relative">💬<span class="nb" id="msg-nb" style="display:none">2</span></button>
    <button class="ib" onclick="openNotif()" aria-label="Notificações">🔔<span class="nb" id="notif-nb">3</span></button>
    <button class="ib" onclick="openPerfil()" style="padding:0;border-radius:50%" aria-label="Perfil">
      <div id="top-av" style="width:32px;height:32px;border-radius:50%;background:var(--surf);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:15px">🧑</div>
    </button>
  </div>
</div>
<div id="ptr-bar" style="height:0;overflow:hidden;text-align:center;background:var(--bg);transition:height .2s;font-size:12px;color:var(--green);font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px"></div>
<div id="srch-wrap" style="display:none;padding:8px 14px;border-bottom:1px solid var(--bord);background:var(--bg)">
  <div style="display:flex;align-items:center;gap:9px;background:var(--surf);border:1.5px solid var(--green);border-radius:12px;padding:8px 12px">
    <span style="font-size:15px">🔍</span>
    <input id="srch-in" style="flex:1;background:none;border:none;color:var(--text);font-size:13px;outline:none" placeholder="Buscar jogadores, times, campos...">
    <button onclick="toggleSearch()" style="background:var(--muted2);border:none;width:20px;height:20px;border-radius:50%;color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
  </div>
</div>
<div id="screen"></div>
<nav id="bnav">
  <button class="nbi" onclick="go('inicio')"><div class="nbi-ic" id="ni-inicio">🏠</div><span class="nbi-lb" id="nl-inicio">Início</span></button>
  <button class="nbi" onclick="go('jogadores')"><div class="nbi-ic" id="ni-jogadores">👤</div><span class="nbi-lb" id="nl-jogadores">Jogadores</span></button>
  <button class="nbi" onclick="go('torneios')"><div class="nbi-ic" id="ni-torneios">🏆</div><span class="nbi-lb" id="nl-torneios">Torneios</span></button>
  <button class="nbi" onclick="go('campos')"><div class="nbi-ic" id="ni-campos">🏟️</div><span class="nbi-lb" id="nl-campos">Campos</span></button>
  <button class="nbi" onclick="go('social')"><div class="nbi-ic" id="ni-social">📱</div><span class="nbi-lb" id="nl-social">Social</span></button>
</nav>
<div id="modal" onclick="closeModal()"></div>
<div id="toast"></div>
<script>
"use strict";
/* ── DATA ─────────────────────────────────────────── */
var D={
  jogadores:[],
  times:[],
  campos:[],
  camposFirestore:[],camposModo:'lista',camposCarregando:false,camposBusca:'',camposFiltro:'todos',
  campoLat:null,campoLng:null,campoGeoOk:false,
  horarios:[],
  feed:[],
  stories:[
    {id:1,user:"Você",av:"🧑",add:true}
  ],
  notifs:[],
  chat:[],
  jogos:[],
  torneios:[],
  torneiosFirestore:[],tornCarregando:false,tornPagMet:'pix',tornPagEtapa:null,
  conquistas:[
    {id:1,ic:"⚽",nome:"Primeiro Gol",  desc:"1º gol marcado",   on:false,cor:"#FFBE00", tipo:"jogador"},
    {id:2,ic:"🎯",nome:"Assistente",    desc:"10 assistências",  on:false,cor:"#4D9EFF", tipo:"jogador"},
    {id:3,ic:"🏆",nome:"Campeão",       desc:"Venceu torneio",   on:false,cor:"#00F082", tipo:"jogador"},
    {id:4,ic:"🔥",nome:"Em Chamas",     desc:"5 gols seguidos",  on:false,cor:"#FF7043", tipo:"jogador"},
    {id:5,ic:"🛡️",nome:"Muralha",      desc:"10 defesas",       on:false,cor:"#B06EFF", tipo:"jogador"},
    {id:6,ic:"👑",nome:"Lenda",         desc:"100 jogos",        on:false,cor:"#FFBE00", tipo:"jogador"},
    {id:7,ic:"⚡",nome:"Relâmpago",     desc:"Gol em 1 min",     on:false,cor:"#00D4C8", tipo:"jogador"},
    {id:8,ic:"💎",nome:"Diamante",      desc:"Nota 5.0",         on:false,cor:"#B06EFF", tipo:"jogador"},
    {id:9, ic:"🟡",nome:"100 Partidas", desc:"100 jogos apitados",on:false,cor:"#FFBE00", tipo:"juiz"},
    {id:10,ic:"📋",nome:"Cartão Limpo", desc:"10 jogos sem vm",  on:false,cor:"#00F082", tipo:"juiz"},
    {id:11,ic:"⚖️",nome:"Imparcial",   desc:"Nota 4.5+ mantida",on:false,cor:"#4D9EFF", tipo:"juiz"},
    {id:12,ic:"🎓",nome:"Certificado",  desc:"Licença federação",on:false,cor:"#B06EFF", tipo:"juiz"},
    {id:13,ic:"🏅",nome:"Finalista",    desc:"Apitou final major",on:false,cor:"#FFBE00", tipo:"juiz"},
    {id:14,ic:"🌟",nome:"5 Estrelas",   desc:"Nota perfeita",    on:false,cor:"#FF7043", tipo:"juiz"}
  ],
  msgs:[],
  rel:{rec:0,res:0,users:0,ncampos:0,cresc:0,
    sem:[0,0,0,0,0,0,0],
    top:[]}
};

/* ── STATE ────────────────────────────────────────── */
var S={
  logado:false,loginAba:"entrar",loginErro:"",
  scr:"social",admin:false,adminAba:"dashboard",
  busca:"",buscaAtiva:false,
  configs:{notif:true,sons:true,privado:false},
  curtidos:{},salvos:{},stVisto:{},seguindo:{},cSeguindo:{},cMembro:{},
  feedTab:"todos",
  jFP:"Todos",jFN:"Todos",jBusca:"",
  jSel:null,jAv:false,jES:0,jCriar:false,
  tSel:null,tAba:"info",chatMsgs:null,
  tCriar:false,regJogo:false,
  cSel:null,cEtapa:"lista",cAbaDet:"fotos",cFotoIdx:0,cAbaH:"disp",horSel:null,
  pagMet:"pix",pagJog:5,cCadastr:false,
  jogoTab:"rec",
  pTipo:"post",pTxt:"",
  comentando:null,vplay:null,
  tornAba:"abertos",tornSel:null,tornCriar:false,
  msgSel:null,msgChat:[],msgChats:{},stMidiaUrl:null,stMidiaTipo:null,stMidiaBlob:null,stMidiaFile:null,
  perfNome:"Você",perfPos:"MEI",perfNivel:"Avançado",perfCidade:"Goiânia",perfAv:"🧑"
};

/* ── HELPERS ──────────────────────────────────────── */
function pl(txt,cor,bg){return '<span class="pl" style="background:'+(bg||cor+'22')+';color:'+cor+';border:1px solid '+cor+'35">'+txt+'</span>';}
function av(em,sz,ring){sz=sz||38;var b=ring?'2px solid '+ring:'1.5px solid var(--bord)';return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:var(--surf);border:'+b+';display:flex;align-items:center;justify-content:center;font-size:'+Math.floor(sz*.43)+'px;flex-shrink:0">'+em+'</div>';}
function stars(nota,sz){sz=sz||12;var s='<span class="stars">';for(var i=1;i<=5;i++)s+='<span style="font-size:'+sz+'px;color:'+(i<=Math.round(nota)?'#FFBE00':'#2A3A52')+'">★</span>';return s+'<span style="color:var(--muted);font-size:'+(sz-1)+'px;margin-left:3px">'+nota+'</span></span>';}
function dv(){return '<hr class="dv">';}
function bb(oc){return '<button class="bbtn" onclick="'+oc+'">← Voltar</button>';}
function sc(){var el=document.getElementById('screen');if(el)el.scrollTop=0;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='show';setTimeout(function(){t.className='';},2400);}

/* ── NAVIGATION ───────────────────────────────────── */
function go(id){
  S.scr=id;S.admin=false;
  S.jSel=null;S.jCriar=false;S.tSel=null;S.tCriar=false;
  S.cSel=null;S.cEtapa='lista';S.cCadastr=false;
  S.tornSel=null;S.tornCriar=false;S.msgSel=null;
  render();sc();
}
function setNav(id){
  ['inicio','jogadores','torneios','campos','social'].forEach(function(n){
    var ic=document.getElementById('ni-'+n);
    var lb=document.getElementById('nl-'+n);
    if(ic)ic.className='nbi-ic'+(n===id&&!S.admin?' a':'');
    if(lb)lb.className='nbi-lb'+(n===id&&!S.admin?' a':'');
  });
}
function render(){
  var el=document.getElementById('screen');
  if(!el)return;
  if(!S.logado){el.innerHTML=screenLogin();setNav('');refreshBadges();return;}
  if(S.busca&&S.busca.length>1){el.innerHTML=screenBusca();setNav('');refreshBadges();setTimeout(bindEvents,50);return;}
  try{
    var map={inicio:screenInicio,jogadores:screenJogadores,torneios:screenTorneios,
             campos:screenCampos,social:screenSocial,mensagens:screenMensagens,times:screenTimes,
             ranking:screenRanking,historico:screenHistorico};
    el.innerHTML=S.admin?screenAdmin():(map[S.scr]||screenSocial)();
  }catch(e){el.innerHTML='<div style="padding:20px;color:var(--red)">Erro: '+e.message+'</div>';}
  setNav(S.scr);
  refreshBadges();
  setTimeout(bindEvents,50);
}
function toggleSearch(){
  S.buscaAtiva=!S.buscaAtiva;
  var w=document.getElementById('srch-wrap');
  if(w)w.style.display=S.buscaAtiva?'block':'none';
  if(S.buscaAtiva){
    setTimeout(function(){var el=document.getElementById('srch-in');if(el){el.focus();el.addEventListener('input',function(e){S.busca=e.target.value;render();});}},80);
  } else {
    S.busca='';render();
  }
}
function screenBusca(){
  var q=S.busca.toLowerCase();
  var jogs=D.jogadores.filter(function(j){return j.nome.toLowerCase().indexOf(q)>=0;});
  var times=D.times.filter(function(t){return t.nome.toLowerCase().indexOf(q)>=0;});
  var _todosCampos=(D.camposFirestore.length>0?D.camposFirestore:D.campos);
  var campos=_todosCampos.filter(function(c){return (c.nome||'').toLowerCase().indexOf(q)>=0;});
  var torns=D.torneios.filter(function(t){return t.nome.toLowerCase().indexOf(q)>=0;});
  var total=jogs.length+times.length+campos.length+torns.length;
  var o='<div class="fu" style="padding:14px">';
  if(total===0){return o+'<div class="empty"><div style="font-size:38px;margin-bottom:10px">🔍</div><div>Nenhum resultado para "'+esc(S.busca)+'"</div></div></div>';}
  o+='<div style="color:var(--muted);font-size:12px;margin-bottom:14px">'+total+' resultado'+(total>1?'s':'')+' para "'+esc(S.busca)+'"</div>';
  function section(titulo,items,renderFn){if(!items.length)return '';var s='<div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:8px">'+titulo+'</div>';items.forEach(function(i){s+=renderFn(i);});return s+'<div style="height:14px"></div>';}
  o+=section('Jogadores',jogs,function(j){return '<div class="ri" onclick="toggleSearch();openJogador('+j.id+')">'+av(j.av,38)+'<div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(j.nome)+'</div><div style="display:flex;gap:5px;margin-top:3px">'+pl(j.pos,'#00F082')+pl(j.nivel,'#FFBE00')+'</div></div><div style="text-align:right">'+stars(j.nota,10)+'<div style="color:var(--muted);font-size:10px;margin-top:2px">'+j.gols+'⚽</div></div></div>';});
  o+=section('Times',times,function(t){return '<div class="ri" onclick="toggleSearch();openTime('+t.id+')"><div style="font-size:30px">'+t.badge+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(t.nome)+'</div><div style="color:var(--muted);font-size:11px;margin-top:2px">'+t.cidade+' · '+t.vit+'V</div></div>'+pl('Ranking','#4D9EFF')+'</div>';});
  o+=section('Campos',campos,function(c){return '<div class="ri" data-cid="'+c.id+'" onclick="toggleSearch();openCampoFirestore(this.dataset.cid)"><div style="font-size:30px">'+(c.img||'🏟️')+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(c.nome||'Campo')+'</div><div style="color:var(--muted);font-size:11px;margin-top:2px">'+esc(c.bairro||c.end||'')+'</div></div><div style="color:var(--green);font-weight:900;font-size:14px">R$ '+(c.preco||'--')+'</div></div>';});
  o+=section('Torneios',torns,function(t){return '<div class="ri" data-tid="'+t.id+'" onclick="openTorn(this.dataset.tid);toggleSearch()"><div style="font-size:28px">'+t.badge+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(t.nome)+'</div><div style="color:var(--muted);font-size:11px;margin-top:2px">'+t.data+' · '+t.premio+'</div></div></div>';});
  return o+'</div>';
}
function openConfigs(){
  var items=[{l:'Notificações push',ic:'🔔',k:'notif'},{l:'Sons do app',ic:'🔊',k:'sons'},{l:'Perfil privado',ic:'🔒',k:'privado'}];
  var o='<div style="font-weight:800;font-size:16px;margin:0 0 16px">⚙️ Configurações</div>';
  items.forEach(function(item){
    var on=S.configs[item.k];
    o+='<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--bord)">';
    o+='<div style="display:flex;align-items:center;gap:11px"><span style="font-size:20px">'+item.ic+'</span><span style="font-size:14px">'+item.l+'</span></div>';
    o+='<button class="tog" style="background:'+(on?'var(--green)':'var(--muted2)')+'" onclick="S.configs.'+item.k+'=!S.configs.'+item.k+';openConfigs()">';
    o+='<div class="tog-knob" style="left:'+(on?'23px':'3px')+'"></div></button></div>';
  });
  o+=dv();
  o+='<div style="font-size:11px;color:var(--muted);margin-bottom:13px;text-align:center">ArenaHub v6.0 · Todos os direitos reservados</div>';
  o+='<button class="btn bs bfw" onclick="closeModal()">Fechar</button>';
  showModal(o);
}
function refreshBadges(){
  // Atualiza avatar no topbar
  var av2=document.getElementById('top-av');
  if(av2){
    if(S.perfFotoUrl){
      av2.innerHTML='<img src="'+S.perfFotoUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
      av2.textContent='';
    } else {
      av2.innerHTML='';
      av2.textContent=S.perfAv;
    }
  }
  // Atualiza story "Você" se existir no DOM
  var storyVoce=document.querySelector('.stor-av');
  if(storyVoce){
    if(S.perfFotoUrl){
      storyVoce.innerHTML='<img src="'+S.perfFotoUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
    } else {
      storyVoce.textContent=S.perfAv;
    }
  }
  // Atualiza D.stories[0] (seu story "Você")
  if(D.stories&&D.stories[0]&&D.stories[0].add){
    D.stories[0].av=S.perfFotoUrl||S.perfAv||'🧑';
    D.stories[0].fotoUrl=S.perfFotoUrl||null;
  }
  var nb=document.getElementById('notif-nb');
  var nl2=D.notifs.filter(function(n){return !n.lida;}).length;
  if(nb)nb.textContent=nl2;
  var mnb=document.getElementById('msg-nb');
  var ml=D.msgs.reduce(function(s,m){return s+(m.nl||0);},0);
  if(mnb){if(ml>0){mnb.style.display='flex';mnb.textContent=ml;}else{mnb.style.display='none';}}
}
function bindEvents(){
  var bi=document.getElementById('jb');
  if(bi)bi.addEventListener('input',function(e){S.jBusca=e.target.value;render();});
  var si=document.getElementById('srch-in');
  if(si&&!si._bound){si._bound=true;si.addEventListener('input',function(e){S.busca=e.target.value;render();});}
  var ca=document.getElementById('chat-a');
  if(ca)ca.scrollTop=ca.scrollHeight;
  var mca=document.getElementById('msg-chat-a');
  if(mca)mca.scrollTop=mca.scrollHeight;
  ['chat-in','msg-in'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter'){id==='chat-in'?sendChat():sendMsg();}});
  });
  ['login-email','cad-email'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter'){var nx=document.getElementById(id.replace('email','senha'));if(nx)nx.focus();}});
  });
  ['login-senha','cad-senha'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter'){id.includes('cad')?doCadastro():doLogin();}});
  });

function handleMidiaUpload(input){
  var file=input.files[0];
  if(!file)return;
  S.pMidiaTipo=file.type;

  // Comprime imagem antes de salvar (max 800px, qualidade 0.7)
  if(file.type.startsWith('image/')){
    var img=new Image();
    var reader=new FileReader();
    reader.onload=function(e){
      img.onload=function(){
        var canvas=document.createElement('canvas');
        var maxSize=800;
        var w=img.width, h=img.height;
        if(w>maxSize||h>maxSize){
          if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}
          else{w=Math.round(w*maxSize/h);h=maxSize;}
        }
        canvas.width=w;canvas.height=h;
        var ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        S.pMidiaUrl=canvas.toDataURL('image/jpeg',0.75);
        renderPostModal();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  } else {
    // Vídeo — lê direto
    var reader2=new FileReader();
    reader2.onload=function(e){S.pMidiaUrl=e.target.result;renderPostModal();};
    reader2.readAsDataURL(file);
  }
}
function publicarPost(){

  var btn=document.getElementById('btn-publicar');
  if(btn){btn.textContent='Publicando...';btn.disabled=true;}
  var midia=null;
  if(S.pMidiaUrl){
    if(S.pMidiaTipo&&S.pMidiaTipo.startsWith('video')){
      midia={tipo:'video',url:S.pMidiaUrl};
    } else {
      midia={tipo:'foto',url:S.pMidiaUrl};
    }
  }
  var novoPost={
    user:S.perfNome||'Usuário',
    time:S.perfTime||'',
    txt:txt.trim(),
    likes:0,coments:0,
    tipo:S.pTipo,
    av:S.perfFotoUrl||S.perfAv||'🧑',
    avatarTipo: S.perfFotoUrl?'foto':'emoji',
    uid:S.fbUser?S.fbUser.uid:'',
    midia:midia
  };
  S.pTxt='';S.pMidiaUrl=null;S.pMidiaTipo=null;
  closeModal();

  // Salva no Firestore — o listener onSnapshot atualiza o feed em TODOS os dispositivos
  if(_fbDb){
    var postData=Object.assign({},novoPost);
    postData.timestamp=firebase.firestore.FieldValue.serverTimestamp();
    // Imagem base64: limita tamanho (Firestore max 1MB por doc)
    if(postData.midia&&postData.midia.url&&postData.midia.url.length>800000){
      postData.midia.url=postData.midia.url.substring(0,800000);
    }
    _fbDb.collection('posts').add(postData)
      .then(function(){toast('Publicado! ✓ 🎉');})
      .catch(function(err){
        toast('Erro ao publicar: '+err.message);
        console.warn(err);
      });
  } else {
    // Fallback local se Firestore não disponível
    novoPost.id=Date.now();
    novoPost.hora='agora';
    novoPost.meu=true;
    D.feed.unshift(novoPost);
    render();
    toast('Publicado localmente ✓');
  }
}

function handleFotoPerfil(input){
  var file=input.files[0];
  if(!file)return;
  var img=new Image();
  var reader=new FileReader();
  reader.onload=function(e){
    img.onload=function(){
      // Comprime para 300x300 (avatar de perfil)
      var canvas=document.createElement('canvas');
      var size=300;
      var w=img.width,h=img.height;
      // Crop quadrado centralizado
      var min=Math.min(w,h);
      var sx=(w-min)/2, sy=(h-min)/2;
      canvas.width=size;canvas.height=size;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,sx,sy,min,min,0,0,size,size);
      S.perfFotoUrl=canvas.toDataURL('image/jpeg',0.85);
      // Atualiza topbar imediatamente
      refreshBadges();
      toast('Foto carregada! ✓');
      openEditPerfil();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── FIRESTORE — FEED TEMPO REAL ─────────────────── */
function _iniciarFeedRealtime(){
  if(!_fbDb)return;
  if(_feedUnsub){_feedUnsub();}
  _feedUnsub=_fbDb.collection('posts')
    .orderBy('timestamp','desc')
    .limit(50)
    .onSnapshot({includeMetadataChanges:false}, function(snapshot){
      // Usa docChanges para atualizar apenas o que mudou (mais eficiente)
      snapshot.docChanges().forEach(function(change){
        var d=change.doc.data();
        d.id=change.doc.id;
        d.hora=_tempoRelativo(d.timestamp);
        if(change.type==='added'){
          // Adiciona post novo no início se não existe
          var existe=D.feed.some(function(p){return p.id===d.id;});
          if(!existe) D.feed.unshift(d);
          else {
            // Atualiza post existente preservando curtidas locais
            for(var i=0;i<D.feed.length;i++){
              if(D.feed[i].id===d.id){D.feed[i]=d;break;}
            }
          }
        } else if(change.type==='modified'){
          // Atualiza campos como likes e coments em tempo real
          for(var i=0;i<D.feed.length;i++){
            if(D.feed[i].id===d.id){D.feed[i]=d;break;}
          }
        } else if(change.type==='removed'){
          D.feed=D.feed.filter(function(p){return p.id!==d.id;});
        }
      });
      // Mantém ordem por timestamp
      D.feed.sort(function(a,b){
        var ta=a.timestamp?a.timestamp.toMillis?a.timestamp.toMillis():a.timestamp:0;
        var tb=b.timestamp?b.timestamp.toMillis?b.timestamp.toMillis():b.timestamp:0;
        return tb-ta;
      });
      render();
    },function(err){
      console.warn('Feed error:',err.message);
      // Fallback: relê tudo
      _fbDb.collection('posts').orderBy('timestamp','desc').limit(50).get()
        .then(function(snap){
          var posts=[];
          snap.forEach(function(doc){var d=doc.data();d.id=doc.id;d.hora=_tempoRelativo(d.timestamp);posts.push(d);});
          D.feed=posts;render();
        });
    });
}

var _storiesUnsub = null;

function _iniciarStoriesRealtime(){
  if(!_fbDb||!S.fbUser)return;
  if(_storiesUnsub){_storiesUnsub();}
  // Busca stories das últimas 24h
  var limite = new Date(Date.now() - 24*60*60*1000);
  _storiesUnsub = _fbDb.collection('stories')
    .where('expira','>', firebase.firestore.Timestamp.fromDate(limite))
    .orderBy('expira','asc')
    .onSnapshot(function(snap){
      // Agrupa por usuário — cada usuário tem 1 story no topo
      var mapa = {};
      snap.forEach(function(doc){
        var d = doc.data();
        d.id = doc.id;
        d.hora = _tempoRelativo(d.timestamp);
        // Pega o story mais recente de cada usuário
        if(!mapa[d.uid] || d.timestamp > mapa[d.uid].timestamp){
          mapa[d.uid] = d;
        }
      });
      // Reconstrói D.stories mantendo o "Você" no início
      var stVoce = {id:'add',user:'Você',av:S.perfFotoUrl||S.perfAv||'🧑',add:true,fotoUrl:S.perfFotoUrl||null,cor:'var(--green)'};
      var outros = Object.values(mapa)
        .filter(function(s){ return s.uid !== S.fbUser.uid; })
        .map(function(s){
          var cache = _usuariosCache[s.uid]||{};
          return {
            id: s.id,
            uid: s.uid,
            user: s.nome||cache.nome||'Usuário',
            av: cache.fotoUrl||cache.av||'🧑',
            fotoUrl: cache.fotoUrl||null,
            midiaUrl: s.midiaUrl,
            midiaType: s.midiaType,
            cor: 'linear-gradient(135deg,#FF6B6B,#FF8E53)',
            hora: s.hora,
            storyData: s
          };
        });
      // Verifica se o usuário atual tem story(s) — guarda todos para navegação
      var meuStory = mapa[S.fbUser.uid];
      if(meuStory){
        stVoce.temStory = true;
        stVoce.midiaUrl = meuStory.midiaUrl;
        stVoce.midiaType = meuStory.midiaType;
        stVoce.storyData = meuStory;
        stVoce.cor = 'linear-gradient(135deg,var(--green),var(--teal))';
        // Guardar lista completa de stories do próprio usuário para navegação
        stVoce.meusStories = [];
        snap.forEach(function(doc){
          var d = doc.data();
          if(d.uid === S.fbUser.uid){
            d.id = doc.id;
            d.hora = _tempoRelativo(d.timestamp);
            stVoce.meusStories.push(d);
          }
        });
        // Ordena do mais antigo para mais recente (ordem de exibição)
        stVoce.meusStories.sort(function(a,b){ return a.timestamp - b.timestamp; });
      }
      D.stories = [stVoce].concat(outros);
      render();
    }, function(){});
}

function publicarStory(){
  var temFoto = !!S.stMidiaUrl;
  var temVideo = !!(S.stMidiaFile || S.stMidiaBlob);
  if(!temFoto && !temVideo){ toast('Adicione uma foto ou vídeo ao story! 📸'); return; }
  if(!_fbDb||!S.fbUser){ toast('Faça login para publicar'); return; }

  if(S.stMidiaTipo === 'video' && S.stMidiaFile){
    // Vídeo: converter para base64, mas limitar a 900KB
    var maxVideoSize = 900 * 1024; // 900KB
    if(S.stMidiaFile.size > maxVideoSize){
      toast('Vídeo muito grande! Máx 900KB. Grave um vídeo mais curto. 🎬');
      return;
    }
    var vrdr = new FileReader();
    vrdr.onload = function(e){
      _salvarStoryFirestore(e.target.result, 'video');
    };
    vrdr.onerror = function(){ toast('Erro ao ler vídeo'); };
    vrdr.readAsDataURL(S.stMidiaFile);
  } else if(temFoto){
    _salvarStoryFirestore(S.stMidiaUrl, 'foto');
  }
}

function _salvarStoryFirestore(midiaUrl, tipo){
  var agora = firebase.firestore.Timestamp.now();
  var expira = new Date(Date.now() + 24*60*60*1000);
  _fbDb.collection('stories').add({
    uid: S.fbUser.uid,
    nome: S.perfNome,
    fotoUrl: S.perfFotoUrl || null,
    midiaUrl: midiaUrl,
    midiaType: tipo || 'foto',
    timestamp: agora,
    expira: firebase.firestore.Timestamp.fromDate(expira)
  }).then(function(){
    _limparStoryMidia();
    closeModal();
    toast('Story publicado! ✓ Expira em 24h ⏱️');
  }).catch(function(err){
    toast('Erro ao publicar story: '+err.message);
  });
}

function _limparStoryMidia(){
  if(S.stMidiaBlob){ try{URL.revokeObjectURL(S.stMidiaBlob);}catch(e){} }
  S.stMidiaUrl = null;
  S.stMidiaBlob = null;
  S.stMidiaTipo = null;
  S.stMidiaFile = null;
}

function handleStoryMidia(input){
  var file = input.files[0];
  if(!file) return;
  // Limpar mídia anterior
  if(S.stMidiaBlob){ try{URL.revokeObjectURL(S.stMidiaBlob);}catch(e){} }
  S.stMidiaUrl = null;
  S.stMidiaBlob = null;
  S.stMidiaFile = null;
  S.stMidiaTipo = file.type.startsWith('video') ? 'video' : 'foto';

  if(file.type.startsWith('image/')){
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function(e){
      img.onload = function(){
        var canvas = document.createElement('canvas');
        var maxW = 720, maxH = 1280;
        var w = img.width, h = img.height;
        if(w > 0 && h > 0){
          if(w/h > maxW/maxH){ h = Math.round(h*maxW/w); w = maxW; }
          else { w = Math.round(w*maxH/h); h = maxH; }
          if(w > maxW){ h = Math.round(h*maxW/w); w = maxW; }
          if(h > maxH){ w = Math.round(w*maxH/h); h = maxH; }
        }
        canvas.width = w || 720; canvas.height = h || 1280;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        S.stMidiaUrl = canvas.toDataURL('image/jpeg', 0.80);
        S.stMidiaTipo = 'foto';
        openStoryModal();
      };
      img.onerror = function(){ toast('Erro ao carregar imagem'); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  } else if(file.type.startsWith('video/')){
    // Vídeo: blob URL para preview (base64 estoura o Firestore)
    S.stMidiaBlob = URL.createObjectURL(file);
    S.stMidiaFile = file;
    S.stMidiaTipo = 'video';
    openStoryModal();
  } else {
    toast('Formato não suportado. Use foto ou vídeo.');
  }
}

// Visor de story em tela cheia
var _storyTimer = null;
var _storyIdx = 0;
var _storyLista = [];

function verStoryId(id){
  // Busca dados do story pelo ID em D.stories (evita passar base64 no onclick)
  var found = null;
  var listaCompleta = null;
  D.stories.forEach(function(s){
    if(s.id === id){
      if(s.add && s.storyData && s.storyData.midiaUrl){
        found = s.storyData;
        // Se tiver lista completa de stories, usa ela para navegação
        if(s.meusStories && s.meusStories.length > 0) listaCompleta = s.meusStories;
      } else if(!s.add && s.midiaUrl){
        found = {id:s.id,midiaUrl:s.midiaUrl,midiaType:s.midiaType,user:s.user,nome:s.user,fotoUrl:s.fotoUrl,uid:s.uid,hora:s.hora};
      }
    }
  });
  if(found && found.midiaUrl){
    if(listaCompleta && listaCompleta.length > 1){
      // Múltiplos stories: mostra em sequência
      verStoryLista(listaCompleta, found.id);
    } else {
      verStory(found);
    }
  }
}

function verStoryLista(lista, startId){
  // Exibe lista de stories em sequência (vários stories do mesmo usuário)
  _storyLista = lista.map(function(s){
    return {
      id: s.id,
      midiaUrl: s.midiaUrl,
      midiaType: s.midiaType,
      user: s.nome || 'Você',
      nome: s.nome || 'Você',
      fotoUrl: S.perfFotoUrl || null,
      uid: s.uid,
      hora: s.hora || _tempoRelativo(s.timestamp)
    };
  });
  _storyIdx = _storyLista.findIndex(function(s){ return s.id === startId; });
  if(_storyIdx < 0) _storyIdx = 0;
  _mostrarStoryViewer();
}

function verStory(storyData){
  if(!storyData||!storyData.midiaUrl) return;
  // Monta lista: todos os stories com midia (inclui o "Voce" via storyData)
  _storyLista = [];
  D.stories.forEach(function(s){
    if(s.add && s.temStory && s.storyData && s.storyData.midiaUrl){
      // Story do "Voce" - usa os dados reais do Firestore
      _storyLista.push(s.storyData);
    } else if(!s.add && s.midiaUrl){
      _storyLista.push(s);
    }
  });
  _storyIdx = _storyLista.findIndex(function(s){ return s.id === storyData.id; });
  if(_storyIdx < 0) _storyIdx = 0;
  _mostrarStoryViewer();
}

function _mostrarStoryViewer(){
  if(_storyIdx < 0 || _storyIdx >= _storyLista.length){ fecharStory(); return; }
  var s = _storyLista[_storyIdx];
  S.stVisto = S.stVisto||{};
  S.stVisto[s.id] = true;

  var total = _storyLista.length;
  var progressBars = '';
  for(var i=0;i<total;i++){
    var pct = i < _storyIdx ? '100' : i === _storyIdx ? '0' : '0';
    progressBars += '<div class="story-prog-seg"><div class="story-prog-fill" id="spf'+i+'" style="width:'+pct+'%"></div></div>';
  }

  // Normaliza campos: storyData do Firestore usa .nome, D.stories usa .user
  var sNome = s.user || s.nome || 'Usuário';
  var sFoto = s.fotoUrl || null;
  var sAv   = s.av || '🧑';
  var sHora = s.hora || _tempoRelativo(s.timestamp) || 'agora';
  // Pega foto do cache se não tiver
  if(!sFoto && s.uid && _usuariosCache[s.uid]){
    sFoto = _usuariosCache[s.uid].fotoUrl || null;
  }

  var avHtml = sFoto
    ? '<img src="'+sFoto+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #fff">'
    : '<div style="width:36px;height:36px;border-radius:50%;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:18px">'+sAv+'</div>';

  var mediaSrc = s.midiaUrl || '';
  var mediaHtml = (s.midiaType==='video')
    ? '<video id="story-media" src="'+mediaSrc+'" class="story-media" autoplay playsinline muted loop></video>'
    : '<img id="story-media" src="'+mediaSrc+'" class="story-media">';

  var viewer = document.getElementById('story-viewer');
  if(!viewer){
    viewer = document.createElement('div');
    viewer.id = 'story-viewer';
    viewer.className = 'story-viewer';
    document.body.appendChild(viewer);
  }

  viewer.innerHTML =
    mediaHtml +
    '<div class="story-overlay">' +
      '<div>' +
        '<div class="story-progress-bar">'+progressBars+'</div>' +
        '<div class="story-header">' +
          avHtml +
          '<div style="flex:1"><div style="color:#fff;font-weight:700;font-size:13px">'+esc(sNome)+'</div>' +
          '<div style="color:rgba(255,255,255,.7);font-size:11px">'+sHora+'</div></div>' +
          '<button onclick="fecharStory()" style="background:rgba(0,0,0,.4);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;height:100%;position:absolute;top:0;left:0;right:0">' +
        '<div style="flex:1" onclick="_prevStory()"></div>' +
        '<div style="flex:1" onclick="_nextStory()"></div>' +
      '</div>' +
    '</div>';

  // Barra de progresso animada (5s para foto, 15s para vídeo)
  var dur = (s.midiaType==='video') ? 15000 : 5000;
  if(_storyTimer) { clearInterval(_storyTimer); _storyTimer = null; }
  var _sessaoIdx = _storyIdx; // captura o índice desta sessão
  var _fillId = 'spf' + _storyIdx;
  // Aguarda DOM renderizar, depois inicia timer
  setTimeout(function(){
    // Se o índice mudou entre o setTimeout e agora, aborta
    if(_storyIdx !== _sessaoIdx) return;
    // Se o viewer sumiu, aborta
    if(!document.getElementById('story-viewer')) return;
    var start = Date.now();
    _storyTimer = setInterval(function(){
      // Segurança: se índice mudou ou viewer sumiu, para
      if(_storyIdx !== _sessaoIdx){ clearInterval(_storyTimer); _storyTimer = null; return; }
      var fill = document.getElementById(_fillId);
      var elapsed = Date.now() - start;
      var pct = Math.min(100, (elapsed / dur) * 100);
      if(fill) fill.style.width = pct + '%';
      if(pct >= 100){ clearInterval(_storyTimer); _storyTimer = null; _nextStory(); }
    }, 100);
  }, 80);
}

function _nextStory(){
  if(_storyTimer) clearInterval(_storyTimer);
  _storyIdx++;
  if(_storyIdx >= _storyLista.length){ fecharStory(); return; }
  _mostrarStoryViewer();
}

function _prevStory(){
  if(_storyTimer) clearInterval(_storyTimer);
  _storyIdx = Math.max(0, _storyIdx-1);
  _mostrarStoryViewer();
}

function fecharStory(){
  if(_storyTimer){ clearInterval(_storyTimer); _storyTimer=null; }
  var v = document.getElementById('story-viewer');
  if(v) v.remove();
  render();
}

function _tempoRelativo(ts){
  if(!ts)return 'agora';
  var agora=Date.now();
  var t=ts.toMillis?ts.toMillis():ts;
  var diff=Math.floor((agora-t)/1000);
  if(diff<60)return 'agora';
  if(diff<3600)return Math.floor(diff/60)+'min';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
}

function _salvarPostFirestore(post, callback){
  if(!_fbDb){callback&&callback();return;}
  // Remove campos não serializáveis
  var postData={
    user:post.user||'',
    time:post.time||'',
    txt:post.txt||'',
    tipo:post.tipo||'post',
    av:post.av||'🧑',
    uid:S.fbUser?S.fbUser.uid:'',
    likes:0,
    coments:0,
    timestamp:firebase.firestore.FieldValue.serverTimestamp()
  };
  // Só salva URL de mídia se for uma URL real (não base64 enorme)
  if(post.midia){
    if(post.midia.tipo==='foto'&&post.midia.url){
      // Base64 é grande demais pro Firestore (limite 1MB por doc)
      // Por agora salva indicador, futuramente usar Storage
      postData.midia={tipo:'foto',url:post.midia.url.substring(0,500000)};
    } else if(post.midia.tipo==='video'&&post.midia.url){
      postData.midia={tipo:'video',url:post.midia.url.substring(0,500000)};
    }
  }
  _fbDb.collection('posts').add(postData)
    .then(function(){callback&&callback();})
    .catch(function(err){
      console.warn('Erro ao salvar post:',err.message);
      callback&&callback();
    });
}

function doCadastro(){

function toggleCurtir(id){
  var sid=String(id);
  if(!_fbDb){
    // Sem conexão: local apenas
    S.curtidos[sid]=!S.curtidos[sid];
    render();
    return;
  }
  // Evita duplo clique
  if(S._curtindoId===sid)return;
  S._curtindoId=sid;
  var jaLikei=!!S.curtidos[sid];
  var delta=jaLikei?-1:1;
  S.curtidos[sid]=!jaLikei;
  render(); // atualiza UI imediatamente
  _fbDb.collection('posts').doc(sid).update({
    likes:firebase.firestore.FieldValue.increment(delta)
  }).then(function(){
    S._curtindoId=null;
    // Notifica o dono do post se for curtida (não descurtida)
    if(!jaLikei){
      var post=D.feed.filter(function(p){return p.id===sid;})[0];
      if(post&&post.uid&&post.uid!==S.fbUser.uid){
        _enviarNotificacao(post.uid,'like',S.perfNome+' curtiu sua publicação ❤️',S.fbUser.uid,'like');
      }
    }
  }).catch(function(err){
    // Reverte se der erro
    S.curtidos[sid]=jaLikei;
    S._curtindoId=null;
    render();
    toast('Erro ao curtir');
  });
}

  if(!S.fbUser||!_fbDb){toast('Faça login para seguir');return;}

  var jaSegue=!!S.seguindo[uid];

  var batch=_fbDb.batch();

  if(!jaSegue){
    // Seguir: cria documento em /seguindo/{meuUid}/lista/{uidAlvo}
    var segRef=_fbDb.collection('seguindo').doc(meuUid).collection('lista').doc(uid);

    _enviarNotificacao(uid,'seguiu',S.perfNome+' começou a te seguir 👤',S.fbUser.uid,'follow');
  } else {

    var segRef2=_fbDb.collection('seguindo').doc(meuUid).collection('lista').doc(uid);

    toast('Deixou de seguir');

  batch.commit().catch(function(err){

    S.seguindo[uid]=jaSegue;

    fotoUrl: fotoDestino && fotoDestino.startsWith('data:') ? fotoDestino : null
  };
  S.msgChat = [];
  go('mensagens');
  _abrirChatFirestore(chatId, uidDestino, nomeDestino);
}

function openMsg(chatId){
  // Busca dados do chat em D.msgs
  var conv = D.msgs.filter(function(m){ return m.id === chatId; })[0];
  if(!conv) return;
  S.msgSel = conv;
  S.msgChat = [];
  render(); sc();
  _abrirChatFirestore(chatId, conv.uid, conv.nome);
}

function _abrirChatFirestore(chatId, uidDestino, nomeDestino){
  if(!_fbDb) return;
  // Cancela listener anterior
  if(_chatUnsub){ _chatUnsub(); _chatUnsub = null; }
  _chatAtivo = chatId;

  // Cria documento do chat se não existir
  var chatRef = _fbDb.collection('chats').doc(chatId);
  chatRef.set({
    participantes: [S.fbUser.uid, uidDestino],
    atualizado: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge: true});

  // Listener das mensagens em tempo real
  _chatUnsub = chatRef.collection('mensagens')
    .orderBy('timestamp', 'asc')
    .limit(100)
    .onSnapshot(function(snap){
      var msgs = [];
      snap.forEach(function(doc){
        var d = doc.data();
        d.id = doc.id;
        d.meu = d.uid === S.fbUser.uid;
        d.hora = _tempoRelativo(d.timestamp);
        msgs.push(d);
      });
      S.msgChat = msgs;
      render();
      // Scroll para o final
      setTimeout(function(){
        var el = document.getElementById('msg-chat-a');
        if(el) el.scrollTop = el.scrollHeight;
      }, 100);
      // Marca como lidas
      _marcarMsgLidas(chatId);
    }, function(err){ console.warn('Chat error:', err); });
}

function _marcarMsgLidas(chatId){
  if(!_fbDb || !S.fbUser) return;
  _fbDb.collection('chats').doc(chatId).update({
    ['lido_' + S.fbUser.uid]: true
  }).catch(function(){});
}

function backMsgs(){
  if(_chatUnsub){ _chatUnsub(); _chatUnsub = null; }
  _chatAtivo = null;
  S.msgSel = null;
  render(); sc();
}

function sendMsg(){
  var inp = document.getElementById('msg-in');
  if(!inp || !inp.value.trim()) return;
  if(!_fbDb || !S.msgSel) return;
  var txt = inp.value.trim();
  inp.value = '';
  var chatId = S.msgSel.id;
  var msg = {
    txt: txt,
    uid: S.fbUser.uid,
    nome: S.perfNome,
    av: S.perfFotoUrl || S.perfAv || '🧑',
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };
  // Salva mensagem
  _fbDb.collection('chats').doc(chatId).collection('mensagens').add(msg);
  // Atualiza preview do chat
  _fbDb.collection('chats').doc(chatId).set({
    ultima: txt,
    ultimaHora: firebase.firestore.FieldValue.serverTimestamp(),
    participantes: [S.fbUser.uid, S.msgSel.uid],
    ['lido_' + S.msgSel.uid]: false,
    atualizado: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge: true});
  // Notifica destinatário
  _enviarNotificacao(S.msgSel.uid, 'msg', S.perfNome + ' te enviou uma mensagem 💬', S.fbUser.uid, 'msg');
}

function _carregarConversasFirestore(){
  if(!_fbDb || !S.fbUser) return;
  _fbDb.collection('chats')
    .where('participantes', 'array-contains', S.fbUser.uid)
    .orderBy('atualizado', 'desc')
    .limit(30)
    .onSnapshot(function(snap){
      var convs = [];
      snap.forEach(function(doc){
        var d = doc.data();
        var uidOutro = d.participantes.filter(function(u){ return u !== S.fbUser.uid; })[0];
        var naoLido = d['lido_' + S.fbUser.uid] === false;
        // Busca nome do outro usuário
        var outro = _usuariosCache[uidOutro] || {};
        convs.push({
          id: doc.id,
          uid: uidOutro,
          nome: outro.nome || 'Usuário',
          av: outro.fotoUrl || outro.av || '🧑',
          fotoUrl: outro.fotoUrl || null,
          ultima: d.ultima || '',
          hora: _tempoRelativo(d.atualizado),
          nl: naoLido ? 1 : 0
        });
        // Garante cache do outro usuário
        if(uidOutro && !_usuariosCache[uidOutro]){
          _carregarUsuarioCache(uidOutro);
        }
      });
      D.msgs = convs;
      refreshBadges();
      if(S.scr === 'mensagens') render();
    }, function(){});
}

      postAvHtml='<div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid '+cor+'"><img src="'+autorFoto.fotoUrl+'" style="width:100%;height:100%;object-fit:cover"></div>';
    } else if(post.avatarTipo==='foto'&&post.av&&post.av.length>100){
      // av é base64 diretamente no post
      postAvHtml='<div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid '+cor+'"><img src="'+post.av+'" style="width:100%;height:100%;object-fit:cover"></div>';
      // Carrega do Firestore em background para o próximo render
      if(post.uid && !_usuariosCache[post.uid]) _carregarUsuarioCache(post.uid);
    } else {
      postAvHtml=av(post.av||'🧑',40,cor);
      // Carrega foto do autor em background
      if(post.uid && !_usuariosCache[post.uid]) _carregarUsuarioCache(post.uid);
    }
    // Marca post do usuário atual
    var isMeu=S.fbUser&&post.uid===S.fbUser.uid;
    o+='<div class="post-hd">'+postAvHtml+
      '<div style="flex:1;min-width:0;margin-left:1px"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap"><span class="post-name">'+esc(post.user)+'</span>'+pl(TLBL[post.tipo]||post.tipo,cor)+(isMeu?'<span style="font-size:9px;color:var(--muted)">você</span>':'')+'</div>'+

      '<button style="background:none;border:none;color:var(--muted);font-size:19px;padding:0 3px;cursor:pointer" onclick="openPostOpts(\''+post.id+'\','+isMeu+')">···</button></div>';
    o+='<p class="post-txt">'+esc(post.txt)+'</p>';
    o+=midia;
    var pid = "'" + post.id + "'";
    o+='<div class="pacts">'+
      '<button class="pa" onclick="toggleCurtir('+pid+')" style="color:'+(curtido?'var(--red)':'var(--muted)')+'"><span class="pi">'+(curtido?'❤️':'🤍')+'</span>'+(post.likes||0)+'</button>'+
      '<button class="pa" onclick="openComments('+pid+')" style="color:var(--muted)"><span class="pi">💬</span>'+(post.coments||0)+'</button>'+
      '<button class="pa"><span class="pi">↗️</span>Compartilhar</button>'+
      '<div style="flex:1"></div>'+
      '<button class="pa" onclick="toggleSalvar('+pid+')" style="color:'+(salvo?'var(--gold)':'var(--muted)')+'"><span class="pi">'+(salvo?'🔖':'🏷️')+'</span></button>'+
      '</div>';
    if(coment){
      o+='<div class="cbox"><div class="crow">'+av('🧑',28)+
        '<input class="cinput" placeholder="Adicionar comentário..."><button class="csend">↑</button></div></div>';
    }
    o+='</div>';
  });
  o+='</div>';
  return o;
}

/* ── JOGADORES ──────────────────────────────────── */
function screenJogadores(){
  if(S.jCriar)return screenCriarPerfil();
  if(S.jSel)return screenJogadorDetalhe(S.jSel);
  var POS=['Todos','GOL','ZAG','LAT','VOL','MEI','ATA','PNT','JUI'];
  var NIV=['Todos','Iniciante','Intermediário','Avançado','Profissional'];
  var filtrados=D.jogadores.filter(function(j){
    return(S.jFP==='Todos'||j.pos===S.jFP)&&(S.jFN==='Todos'||j.nivel===S.jFN)&&
      j.nome.toLowerCase().indexOf(S.jBusca.toLowerCase())>=0;
  });
  // Split jogadores e árbitros para exibição
  var somenteJogadores = filtrados.filter(function(j){ return j.pos !== 'JUI'; });
  var arbitros = filtrados.filter(function(j){ return j.pos === 'JUI'; });
  var o='<div class="fu" style="padding:0 14px">';
  o+='<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 13px"><span class="stl">Jogadores</span><button class="btn bp bsm" onclick="S.jCriar=true;render()">+ Criar Perfil</button></div>';
  o+='<div class="fg"><input class="fi" id="jb" value="'+esc(S.jBusca)+'" placeholder="🔍 Buscar jogadores..."></div>';
  o+='<div class="sr" style="margin-bottom:5px">';
  POS.forEach(function(f){o+='<button style="flex-shrink:0;border-radius:99px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;background:'+(S.jFP===f?'var(--green)':'var(--card)')+';color:'+(S.jFP===f?'var(--bg)':'var(--text2)')+';border:1px solid '+(S.jFP===f?'var(--green)':'var(--bord)')+'" onclick="setJFP(\''+f+'\')">'+f+'</button>';});
  o+='</div><div class="sr" style="margin-bottom:13px">';
  NIV.forEach(function(f){o+='<button style="flex-shrink:0;border-radius:99px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;background:'+(S.jFN===f?'var(--gold)':'var(--card)')+';color:'+(S.jFN===f?'var(--bg)':'var(--text2)')+';border:1px solid '+(S.jFN===f?'var(--gold)':'var(--bord)')+'" onclick="setJFN(\''+f+'\')">'+f+'</button>';});
  o+='</div>';
  o+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:800;font-size:12px;text-transform:uppercase">🏆 Ranking</span><span style="color:var(--muted);font-size:12px">'+filtrados.length+' jogadores</span></div>';
  // PODIUM (only when no filters active and no search and enough players)
  if(S.jFP==='Todos'&&S.jFN==='Todos'&&!S.jBusca&&D.jogadores.length>=3){
    var sorted=D.jogadores.slice().sort(function(a,b){return (b.gols*2+b.assist)-(a.gols*2+a.assist);});
    var top3=[
      {j:sorted[1],rank:2,h:68,cor:'#A8B5CC'},
      {j:sorted[0],rank:1,h:90,cor:'#FFBE00'},
      {j:sorted[2],rank:3,h:52,cor:'#FF7043'}
    ];
    o+='<div class="podium">';
    top3.forEach(function(p){
      var pts=(p.j.gols*2+p.j.assist);
      o+='<div class="pod-slot">';
      o+='<div style="width:'+(p.rank===1?60:50)+'px;height:'+(p.rank===1?60:50)+'px;border-radius:50%;background:var(--surf);border:3px solid '+p.cor+';display:flex;align-items:center;justify-content:center;font-size:'+(p.rank===1?26:21)+'px">'+p.j.av+'</div>';
      o+='<div class="pod-nm" style="color:'+(p.rank===1?'var(--text)':'var(--text2)')+'">'+p.j.nome.split(' ')[0]+'</div>';
      o+='<div class="pod-pt" style="color:'+p.cor+'">'+pts+' pts</div>';
      o+='<div class="pod-bar" style="height:'+p.h+'px;background:linear-gradient(180deg,'+p.cor+'40,'+p.cor+'18);border:1px solid '+p.cor+'55;border-bottom:none">'+['🥇','🥈','🥉'][p.rank-1]+'</div>';
      o+='</div>';
    });
    o+='</div>';
  }
  // Lista de jogadores (excluindo árbitros)
  var totalJog = somenteJogadores.length;
  o+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><span style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted)">Jogadores</span><span style="color:var(--muted);font-size:11px">'+totalJog+' encontrados</span></div>';
  somenteJogadores.forEach(function(j,i){
    o+='<div class="ri tap" onclick="openJogador('+j.id+')">';
    o+='<span style="color:'+(i<3?'var(--gold)':'var(--muted)')+';font-weight:900;font-size:14px;width:20px;text-align:center;flex-shrink:0">'+(i<3?['🥇','🥈','🥉'][i]:(i+1)+'º')+'</span>';
    o+=av(j.av,42,i<3?'var(--gold)':'');
    o+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+esc(j.nome)+'</div><div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">'+pl(j.pos,'#00F082')+pl(j.nivel,'#FFBE00')+'</div></div>';
    o+='<div style="text-align:right;flex-shrink:0">'+stars(j.nota||0,10)+'<div style="color:var(--muted);font-size:11px;margin-top:3px">'+(j.gols||0)+'⚽ '+(j.assist||0)+'🎯</div></div></div>';
  });
  if(totalJog===0){o+='<div class="empty" style="padding:16px 0">Nenhum jogador encontrado.</div>';}

  // Seção de árbitros
  if(S.jFP==='Todos'||S.jFP==='JUI'){
    var arbs = S.jFP==='JUI' ? arbitros : D.jogadores.filter(function(j){return j.pos==='JUI'&&(S.jFN==='Todos'||j.nivel===S.jFN)&&j.nome.toLowerCase().indexOf(S.jBusca.toLowerCase())>=0;});
    o+='<div style="margin:20px 0 11px;display:flex;justify-content:space-between;align-items:center">';
    o+='<div style="display:flex;align-items:center;gap:7px"><span style="font-size:16px">🟡</span><span style="font-size:12px;font-weight:800;text-transform:uppercase;color:var(--gold);letter-spacing:.5px">Árbitros da Comunidade</span></div>';
    o+=pl(arbs.length+' disponíveis','#FFBE00')+'</div>';
    if(arbs.length===0){o+='<div class="empty" style="padding:12px 0">Nenhum árbitro encontrado.</div>';}
    arbs.forEach(function(j){
      var ref=j.juiz;
      var nivelCor={Iniciante:'#00D4C8',Intermediário:'#4D9EFF',Avançado:'#FFBE00',Profissional:'#00F082'}[j.nivel]||'#4D9EFF';
      o+='<div class="ri tap" onclick="openJogador('+j.id+')" style="border-color:#FFBE0033;background:linear-gradient(135deg,rgba(255,190,0,.05),var(--card))">';
      o+='<div style="font-size:22px;width:28px;text-align:center;flex-shrink:0">🟡</div>';
      o+=av(j.av,42,'#FFBE00');
      o+='<div style="flex:1;min-width:0">';
      o+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-weight:700;font-size:13px">'+esc(j.nome)+'</span>'+pl('ÁRBITRO','#FFBE00')+'</div>';
      o+='<div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">'+pl(j.nivel,nivelCor)+(ref&&ref.disponivel?pl('Disponível','#00F082'):'')+'</div></div>';
      o+='<div style="text-align:right;flex-shrink:0">'+stars(j.nota,10)+'<div style="color:var(--muted);font-size:11px;margin-top:3px">'+(ref?ref.partidas:'0')+'📋</div></div></div>';
    });
  }
  o+='</div>';
  return o;
}

function _carregarCamposFirestore(){
  if(!_fbDb) return;
  S.camposCarregando = true;
  _fbDb.collection('campos').orderBy('nome','asc').get().then(function(snap){
    S.camposCarregando = false;
    D.camposFirestore = [];
    snap.forEach(function(doc){
      var d = doc.data();
      d.id = doc.id;
      // Calcular distância se tiver geolocalização
      if(S.campoLat && d.lat && d.lng){
        d.distKm = _calcDistKm(S.campoLat, S.campoLng, d.lat, d.lng);
      }
      D.camposFirestore.push(d);
    });
    // Ordenar por distância se tiver localização
    if(S.campoLat){
      D.camposFirestore.sort(function(a,b){ return (a.distKm||999)-(b.distKm||999); });
    }
    render();
    if(S.camposModo==='mapa') _initMapaCampos();
  }).catch(function(e){
    S.camposCarregando = false;
    // Sem campos no Firestore ainda — mostra estado vazio
    render();
  });
}

function _pedirLocalizacao(){
  if(!navigator.geolocation){ toast('Geolocalização não suportada'); return; }
  toast('Obtendo localização... 📍');
  navigator.geolocation.getCurrentPosition(function(pos){
    S.campoLat = pos.coords.latitude;
    S.campoLng = pos.coords.longitude;
    S.campoGeoOk = true;
    // Recalcular distâncias
    D.camposFirestore.forEach(function(c){
      if(c.lat && c.lng) c.distKm = _calcDistKm(S.campoLat, S.campoLng, c.lat, c.lng);
    });
    D.camposFirestore.sort(function(a,b){ return (a.distKm||999)-(b.distKm||999); });
    render();
    _initMapaCampos();
  }, function(){
    toast('Não foi possível obter localização');
  });
}

function _calcDistKm(lat1,lng1,lat2,lng2){
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

var _mapaLeaflet = null;
function _initMapaCampos(){
  // Aguardar o DOM renderizar e estabilizar
  clearTimeout(window._mapaInitTimer);
  window._mapaInitTimer = setTimeout(function(){
    var el = document.getElementById('mapa-campos');
    if(!el || el.offsetWidth === 0) return;
    if(typeof L === 'undefined'){
      if(window._leafletLoading) return;
      window._leafletLoading = true;
      var sc = document.createElement('script');
      sc.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      sc.onload = function(){ window._leafletLoading = false; _renderMapaCampos(); };
      document.head.appendChild(sc);
    } else {

function _renderMapaCampos(){
  var placeholder = document.getElementById('mapa-campos-placeholder');
  if(!placeholder) return;
  // Destruir mapa anterior se existir
  if(_mapaLeaflet){ try{ _mapaLeaflet.off(); _mapaLeaflet.remove(); }catch(e){} _mapaLeaflet=null; }
  // Usar o placeholder como container do mapa - limpar e preparar
  placeholder.innerHTML = '';
  placeholder.style.height = '340px';
  placeholder.style.width = '100%';
  placeholder.style.position = 'relative';
  placeholder.style.borderRadius = '12px';
  placeholder.style.overflow = 'hidden';
  // Usar o placeholder diretamente como container Leaflet
  var el = placeholder;
  if(el._leaflet_id){ try{ delete el._leaflet_id; }catch(e){} }
  // Aguardar 2 frames para garantir que animação CSS terminou
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      // Centro: localização do usuário ou Goiânia
      var lat = S.campoLat || -16.6869;
      var lng = S.campoLng || -49.2648;
      _mapaLeaflet = L.map(el).setView([lat,lng],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OpenStreetMap',maxZoom:18
      }).addTo(_mapaLeaflet);
      setTimeout(function(){ if(_mapaLeaflet) _mapaLeaflet.invalidateSize(true); }, 200);
      // Pin do usuário
      if(S.campoGeoOk){
        var iconUser = L.divIcon({html:'<div style="width:18px;height:18px;border-radius:50%;background:#4D9EFF;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[18,18],iconAnchor:[9,9],className:''});
        L.marker([lat,lng],{icon:iconUser}).addTo(_mapaLeaflet).bindPopup('Você está aqui');
      }
      // Pins dos campos
      var campos = D.camposFirestore.length>0 ? D.camposFirestore : D.campos;
      campos.forEach(function(c){
        if(!c.lat||!c.lng) return;
        var iconCampo = L.divIcon({
          html:'<div style="background:#00F082;border:2px solid #fff;border-radius:10px;padding:4px 7px;font-size:11px;font-weight:800;color:#000;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3)">🏟️ '+esc(c.nome||'Campo')+'</div>',
          className:'',iconAnchor:[0,0]
        });
        L.marker([c.lat,c.lng],{icon:iconCampo}).addTo(_mapaLeaflet)
          .bindPopup('<b>'+esc(c.nome||'Campo')+'</b><br>'+esc(c.bairro||c.end||'')+'<br>R$ '+(c.preco||'--')+'/h<br><button data-cid="'+c.id+'" onclick="openCampoFirestore(this.dataset.cid)" style="margin-top:6px;padding:4px 10px;background:#00F082;border:none;border-radius:6px;font-weight:700;cursor:pointer">Ver detalhes</button>')
          .openPopup();
      });
    }); // fim rAF2
  }); // fim rAF1
}

/* ── PULL TO REFRESH ────────────────────────────── */
(function() {
  var startY = 0, pulling = false, threshold = 65;
  var bar = function() { return document.getElementById('ptr-bar'); };
  document.addEventListener('touchstart', function(e) {
    var scr = document.getElementById('screen');
    if (scr && scr.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, {passive: true});
  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 0 && dy < 120) {
      var b = bar();
      if (b) { b.style.height = Math.min(dy * 0.5, 36) + 'px'; b.innerHTML = dy > threshold ? '🔄 Solte para atualizar' : '↓ Puxe para atualizar'; }
    }
  }, {passive: true});
  document.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    var dy = e.changedTouches[0].clientY - startY;
    var b = bar();
    if (b) b.style.height = '0';
    if (dy > threshold) { toast('Atualizando... 🔄'); setTimeout(function() { render(); toast('Atualizado! ✓'); }, 800); }
  });
})();

var _notifUnsub=null;

function _iniciarNotificacoesRealtime(){
  if(!_fbDb||!S.fbUser)return;
  if(_notifUnsub){_notifUnsub();}
  _notifUnsub=_fbDb.collection('notificacoes').doc(S.fbUser.uid)
    .collection('lista')
    .orderBy('timestamp','desc')
    .limit(30)
    .onSnapshot(function(snap){
      var notifs=[];
      snap.forEach(function(doc){
        var d=doc.data();
        d.id=doc.id;
        d.hora=_tempoRelativo(d.timestamp);
        notifs.push(d);
      });
      D.notifs=notifs;
      refreshBadges();
    },function(){});
}

function _enviarNotificacao(uidDestino,tipo,txt,uidOrigem,tipoIcon){
  if(!_fbDb||!uidDestino||uidDestino===uidOrigem)return;
  _fbDb.collection('notificacoes').doc(uidDestino)
    .collection('lista').add({
      tipo:tipoIcon||tipo,
      txt:txt,
      uidOrigem:uidOrigem||'',
      lida:false,
      timestamp:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(){});
}

function marcarNotifsLidas(){
  if(!_fbDb||!S.fbUser)return;
  var naoLidas=D.notifs.filter(function(n){return !n.lida;});
  var batch=_fbDb.batch();
  naoLidas.forEach(function(n){
    var ref=_fbDb.collection('notificacoes').doc(S.fbUser.uid).collection('lista').doc(n.id);
    batch.update(ref,{lida:true});
  });
  if(naoLidas.length>0) batch.commit().catch(function(){});
}
