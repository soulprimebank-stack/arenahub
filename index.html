<style>
:root{--bg:#07090F;--bg2:#0C0F1A;--surf:#111520;--card:#151B28;--cardhi:#1C2438;--bord:#1E2D45;--green:#00F082;--gold:#FFBE00;--orange:#FF7043;--red:#FF4060;--blue:#4D9EFF;--purple:#B06EFF;--teal:#00D4C8;--pink:#FF4D8D;--text:#EEF2FF;--text2:#A0AECB;--muted:#4E6080;--muted2:#2A3A52;--greenglow:rgba(0,240,130,.14);}
html.light{--bg:#F4F6FA;--bg2:#EAECF2;--surf:#FFFFFF;--card:#FFFFFF;--cardhi:#F0F2F8;--bord:#D8DCE8;--text:#111827;--text2:#4B5563;--muted:#9CA3AF;--muted2:#D1D5DB;--greenglow:rgba(0,180,100,.1);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow-x:hidden;max-width:480px;margin:0 auto;min-height:100vh;}
*{-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;}
input,textarea,select{color:var(--text);background:var(--surf);}
::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .25s ease forwards}
.su{animation:slideUp .3s ease forwards}
#topbar{position:sticky;top:0;z-index:200;background:rgba(7,9,15,.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--bord);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;min-height:54px;}
.logo{display:flex;align-items:center;gap:8px;}.logo-ic{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-tx{font-weight:900;font-size:19px;letter-spacing:-.5px;}.logo-tx .g{color:var(--green);}.logo-tx .o{color:var(--gold);}
.tb-acts{display:flex;gap:4px;align-items:center;}
.ib{width:36px;height:36px;border-radius:9px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;position:relative;cursor:pointer;}
.ib:active{background:var(--card);}
.nb{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:99px;font-size:9px;font-weight:900;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--bg);}
#screen{min-height:calc(100vh - 54px);padding-bottom:72px;overflow-x:hidden;}
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:200;background:rgba(7,9,15,.96);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-top:1px solid var(--bord);display:flex;padding:4px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));}
.nbi{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;cursor:pointer;}
.nbi-ic{width:38px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;transition:background .15s;}
.nbi-ic.a{background:rgba(0,240,130,.15);}
.nbi-lb{font-size:10px;font-weight:500;color:var(--muted);}
.nbi-lb.a{font-weight:800;color:var(--green);}

.msh{width:100%;max-width:480px;background:var(--surf);border-radius:22px 22px 0 0;padding:18px 18px max(36px,calc(env(safe-area-inset-bottom)+18px));border-top:1px solid var(--bord);max-height:90vh;overflow-y:auto;}

.card{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:14px;}
.card.tap:active{background:var(--cardhi);}

.btn{border:none;border-radius:12px;font-weight:800;font-size:13px;padding:10px 18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;-webkit-user-select:none;user-select:none;}

.fg{margin-bottom:13px;}
hr.dv{border:none;border-top:1px solid var(--bord);margin:11px 0;}

.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:20px;}
.scard{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:10px 5px;text-align:center;}
.sval{font-weight:900;font-size:16px;margin:3px 0 2px;}.slbl{color:var(--muted);font-size:10px;}

.stl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;}

.stor-row{display:flex;gap:11px;overflow-x:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;}
.stor{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;}
.stor-ring{padding:2.5px;border-radius:50%;}

.stor-lb{font-size:10px;color:var(--text2);max-width:60px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ftabs{display:flex;gap:7px;overflow-x:auto;padding:0 14px 12px;border-bottom:1px solid var(--bord);-webkit-overflow-scrolling:touch;}
.ftab{flex-shrink:0;border-radius:99px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bord);background:var(--card);color:var(--text2);}
.ftab.a{background:var(--green);color:var(--bg);border-color:var(--green);}
.post{border-bottom:1px solid var(--bord);padding:14px 14px 0;}
.post-hd{display:flex;gap:9px;align-items:flex-start;margin-bottom:10px;}
.post-name{font-weight:800;font-size:14px;}.post-meta{color:var(--muted);font-size:11px;margin-top:2px;}
.post-txt{font-size:14px;line-height:1.6;margin:0 0 10px;}
.post-vid{border-radius:14px;overflow:hidden;margin-bottom:10px;background:var(--surf);border:1px solid var(--bord);position:relative;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.play-ic{width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;font-size:20px;position:absolute;}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;border-radius:14px;overflow:hidden;margin-bottom:10px;}
.pcell{aspect-ratio:1/1;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;}
.pmore{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;}

.ctabs{display:flex;gap:5px;margin-bottom:13px;}

.popt{display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:13px;margin-bottom:7px;cursor:pointer;border:1.5px solid var(--bord);background:var(--surf);}
.popt.a{background:rgba(0,240,130,.1);border-color:var(--green);}
.popt:active{opacity:.8;}
.thero{border-radius:20px;padding:22px;text-align:center;margin-bottom:14px;}
.atabs{display:flex;gap:5px;margin-bottom:13px;}
.atab{flex:1;border-radius:11px;padding:9px 0;font-size:16px;cursor:pointer;border:1px solid var(--bord);background:var(--card);color:var(--text2);}
.chat-a{height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:11px;padding:3px 0;-webkit-overflow-scrolling:touch;}
.cr{display:flex;gap:7px;align-items:flex-end;}.cr.me{flex-direction:row-reverse;}

.cnf-ti{font-weight:900;font-size:24px;margin-bottom:7px;background:linear-gradient(135deg,var(--green),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.kc{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:14px;}
.bch{display:flex;gap:3px;align-items:flex-end;height:86px;}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bw{width:100%;height:60px;display:flex;align-items:flex-end;}
.bb2{width:100%;border-radius:3px 3px 0 0;min-height:3px;}
.pbar{width:100%;background:var(--surf);border-radius:99px;height:4px;}
.pfil{height:4px;border-radius:99px;transition:width .4s;}
.bbtn{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--bord);color:var(--text);border-radius:11px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:14px;}
.bbtn:active{opacity:.8;}
.mini-gal{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;border-radius:13px;overflow:hidden;margin-bottom:11px;}

.star-r{display:flex;justify-content:center;gap:9px;margin-bottom:13px;}

.star-big.on{color:var(--gold);transform:scale(1.12);}
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:13px;}
.ps-card{background:var(--card);border:1px solid var(--bord);border-radius:13px;padding:11px;}

.torn-prog-fill{height:100%;border-radius:99px;}
.mapa-bg{height:200px;display:flex;align-items:center;justify-content:center;position:relative;background:linear-gradient(135deg,#0C1A2E,#0A1520);border-radius:16px;overflow:hidden;margin-bottom:13px;border:1px solid var(--bord);}
.mapa-grid{position:absolute;inset:0;opacity:.12;background-image:linear-gradient(rgba(77,158,255,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(77,158,255,.4) 1px,transparent 1px);background-size:28px 28px;}
.mapa-pin{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.mapa-pin-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.mapa-pin-lb{font-size:9px;font-weight:800;margin-top:2px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap;}
.av-opt{width:44px;height:44px;border-radius:50%;background:var(--surf);border:2px solid var(--bord);font-size:21px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.av-opt.sel{border-color:var(--green);background:rgba(0,240,130,.12);}
.av-opt:active{opacity:.8;}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--green);color:var(--text);border-radius:99px;padding:9px 20px;font-size:13px;font-weight:700;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);}
#toast.show{opacity:1;}
.empty{text-align:center;padding:32px 0;color:var(--muted);font-size:13px;}
.promo-c{border-radius:14px;padding:14px;}
/* BRACKET */
.bracket-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
.bracket{display:flex;gap:12px;padding:2px;}
.bracket-col{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.brt{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:4px;letter-spacing:.5px;}
.bm{background:var(--surf);border:1.5px solid var(--bord);border-radius:10px;padding:7px 10px;min-width:115px;}
.bm-t{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px;}
.bm-t+.bm-t{border-top:1px solid var(--bord);}
.bm-t.el{opacity:.35;}
.bm-sc{font-weight:900;font-size:13px;margin-left:6px;}
/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:6px;margin:16px 0 20px;}
.pod-slot{display:flex;flex-direction:column;align-items:center;gap:4px;}
.pod-bar{border-radius:10px 10px 0 0;width:84px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.pod-nm{font-size:11px;font-weight:700;text-align:center;max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pod-pt{font-size:10px;}
/* CONQUISTAS */
.bdg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.bdg{text-align:center;}
.bdg-ic{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 4px;border:2px solid;}
@keyframes bdg-glow{0%,100%{box-shadow:0 0 6px currentColor}50%{box-shadow:0 0 18px currentColor}}
.bdg-ic.on{animation:bdg-glow 2.5s infinite;}
.bdg-ic.off{filter:grayscale(1);opacity:.28;}
.bdg-lb{font-size:10px;font-weight:700;color:var(--text2);}
/* TOGGLE SWITCH */
.tog{width:46px;height:26px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .2s;}
.tog-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;}
</style>
</head>

/* ── HELPERS ──────────────────────────────────────── */
function pl(txt,cor,bg){return '<span class="pl" style="background:'+(bg||cor+'22')+';color:'+cor+';border:1px solid '+cor+'35">'+txt+'</span>';}
function av(em,sz,ring){sz=sz||38;var b=ring?'2px solid '+ring:'1.5px solid var(--bord)';return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:var(--surf);border:'+b+';display:flex;align-items:center;justify-content:center;font-size:'+Math.floor(sz*.43)+'px;flex-shrink:0">'+em+'</div>';}
function stars(nota,sz){sz=sz||12;var s='<span class="stars">';for(var i=1;i<=5;i++)s+='<span style="font-size:'+sz+'px;color:'+(i<=Math.round(nota)?'#FFBE00':'#2A3A52')+'">★</span>';return s+'<span style="color:var(--muted);font-size:'+(sz-1)+'px;margin-left:3px">'+nota+'</span></span>';}
function dv(){return '<hr class="dv">';}
function bb(oc){return '<button class="bbtn" onclick="'+oc+'">← Voltar</button>';}
function sc(){var el=document.getElementById('screen');if(el)el.scrollTop=0;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='show';setTimeout(function(){t.className='';},2400);}

/* ── NAVIGATION ───────────────────────────────────── */
function go(id){
  S.scr=id;S.admin=false;
  S.jSel=null;S.jCriar=false;S.tSel=null;S.tCriar=false;
  S.cSel=null;S.cEtapa='lista';S.cCadastr=false;
  S.tornSel=null;S.tornCriar=false;S.msgSel=null;
  render();sc();
}
function setNav(id){
  ['inicio','jogadores','torneios','campos','social'].forEach(function(n){
    var ic=document.getElementById('ni-'+n);
    var lb=document.getElementById('nl-'+n);
    if(ic)ic.className='nbi-ic'+(n===id&&!S.admin?' a':'');
    if(lb)lb.className='nbi-lb'+(n===id&&!S.admin?' a':'');
  });
}
function render(){
  var el=document.getElementById('screen');
  if(!el)return;
  if(!S.logado){el.innerHTML=screenLogin();setNav('');refreshBadges();return;}
  if(S.busca&&S.busca.length>1){el.innerHTML=screenBusca();setNav('');refreshBadges();setTimeout(bindEvents,50);return;}
  try{
    var map={inicio:screenInicio,jogadores:screenJogadores,torneios:screenTorneios,
             campos:screenCampos,social:screenSocial,mensagens:screenMensagens,times:screenTimes,
             ranking:screenRanking,historico:screenHistorico};
    el.innerHTML=S.admin?screenAdmin():(map[S.scr]||screenSocial)();
  }catch(e){el.innerHTML='<div style="padding:20px;color:var(--red)">Erro: '+e.message+'</div>';}
  setNav(S.scr);
  refreshBadges();
  setTimeout(bindEvents,50);
}
function toggleSearch(){
  S.buscaAtiva=!S.buscaAtiva;
  var w=document.getElementById('srch-wrap');
  if(w)w.style.display=S.buscaAtiva?'block':'none';
  if(S.buscaAtiva){
    setTimeout(function(){var el=document.getElementById('srch-in');if(el){el.focus();el.addEventListener('input',function(e){S.busca=e.target.value;render();});}},80);
  } else {
    S.busca='';render();
  }
}
function screenBusca(){
  var q=S.busca.toLowerCase();
  var jogs=D.jogadores.filter(function(j){return j.nome.toLowerCase().indexOf(q)>=0;});
  var times=D.times.filter(function(t){return t.nome.toLowerCase().indexOf(q)>=0;});
  var campos=D.campos.filter(function(c){return c.nome.toLowerCase().indexOf(q)>=0;});
  var torns=D.torneios.filter(function(t){return t.nome.toLowerCase().indexOf(q)>=0;});
  var total=jogs.length+times.length+campos.length+torns.length;
  var o='<div class="fu" style="padding:14px">';
  if(total===0){return o+'<div class="empty"><div style="font-size:38px;margin-bottom:10px">🔍</div><div>Nenhum resultado para "'+esc(S.busca)+'"</div></div></div>';}
  o+='<div style="color:var(--muted);font-size:12px;margin-bottom:14px">'+total+' resultado'+(total>1?'s':'')+' para "'+esc(S.busca)+'"</div>';
  function section(titulo,items,renderFn){if(!items.length)return '';var s='<div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:8px">'+titulo+'</div>';items.forEach(function(i){s+=renderFn(i);});return s+'<div style="height:14px"></div>';}
  o+=section('Jogadores',jogs,function(j){return '<div class="ri" onclick="toggleSearch();openJogador('+j.id+')">'+av(j.av,38)+'<div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(j.nome)+'</div><div style="display:flex;gap:5px;margin-top:3px">'+pl(j.pos,'#00F082')+pl(j.nivel,'#FFBE00')+'</div></div><div style="text-align:right">'+stars(j.nota,10)+'<div style="color:var(--muted);font-size:10px;margin-top:2px">'+j.gols+'⚽</div></div></div>';});
  o+=section('Times',times,function(t){return '<div class="ri" onclick="toggleSearch();openTime('+t.id+')"><div style="font-size:30px">'+t.badge+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(t.nome)+'</div><div style="color:var(--muted);font-size:11px;margin-top:2px">'+t.cidade+' · '+t.vit+'V</div></div>'+pl('Ranking','#4D9EFF')+'</div>';});
  o+=section('Campos',campos,function(c){return '<div class="ri" onclick="toggleSearch();openCampo('+c.id+')"><div style="font-size:30px">'+c.img+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(c.nome)+'</div><div style="color:var(--muted);font-size:11px;margin-top:2px">'+esc(c.end)+'</div></div><div style="color:var(--green);font-weight:900;font-size:14px">R$ '+c.preco+'</div></div>';});
  o+=section('Torneios',torns,function(t){return '<div class="ri" onclick="toggleSearch();openTorn('+t.id+')"><div style="font-size:28px">'+t.badge+'</div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(t.nome)+'</div><div style="color:var(--muted);font-size:11px;margin-top:2px">'+t.data+' · '+t.premio+'</div></div></div>';});
  return o+'</div>';
}

function refreshBadges(){
  var av2=document.getElementById('top-av');

  if(nb)nb.textContent=nl2;
  var mnb=document.getElementById('msg-nb');

function bindEvents(){
  var bi=document.getElementById('jb');
  if(bi)bi.addEventListener('input',function(e){S.jBusca=e.target.value;render();});
  var si=document.getElementById('srch-in');
  if(si&&!si._bound){si._bound=true;si.addEventListener('input',function(e){S.busca=e.target.value;render();});}
  var ca=document.getElementById('chat-a');
  if(ca)ca.scrollTop=ca.scrollHeight;
  var mca=document.getElementById('msg-chat-a');
  if(mca)mca.scrollTop=mca.scrollHeight;
  ['chat-in','msg-in'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter'){id==='chat-in'?sendChat():sendMsg();}});
  });
  ['login-email','cad-email'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter'){var nx=document.getElementById(id.replace('email','senha'));if(nx)nx.focus();}});
  });
  ['login-senha','cad-senha'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter'){id.includes('cad')?doCadastro():doLogin();}});
  });
}

/* ── LOGIN ACTIONS ────────────────────────────────── */
function setLoginAba(a){S.loginAba=a;S.loginErro='';render();}

function doLogin(){
  var em=document.getElementById('login-email');
  var sn=document.getElementById('login-senha');
  if(!em||!sn){return;}
  if(!em.value.trim()||!sn.value.trim()){S.loginErro='Preencha email e senha.';render();return;}
  S.loginErro='';
  // Show loading
  var btn=document.querySelector('#login-btn');
  if(btn){btn.textContent='Entrando...';btn.disabled=true;}
  var auth=_initFirebase();
  auth.signInWithEmailAndPassword(em.value.trim(),sn.value.trim())
    .then(function(cred){
      S.logado=true;
      S.fbUser=cred.user;
      S.perfNome=cred.user.displayName||cred.user.email.split('@')[0];
      S.perfEmail=cred.user.email;
      render();
      toast('Bem-vindo de volta, '+S.perfNome+'! 👋');
      checkOnboarding();
    })
    .catch(function(err){
      var msgs={
        'auth/user-not-found':'Email não encontrado.',
        'auth/wrong-password':'Senha incorreta.',
        'auth/invalid-email':'Email inválido.',
        'auth/too-many-requests':'Muitas tentativas. Tente mais tarde.',
        'auth/invalid-credential':'Email ou senha incorretos.'
      };
      S.loginErro=msgs[err.code]||'Erro ao entrar. Tente novamente.';
      render();
    });
}

function doDemo(){
  var auth=_initFirebase();
  auth.signInAnonymously()
    .then(function(cred){
      S.logado=true;
      S.fbUser=cred.user;
      S.perfNome='Visitante';
      render();

      checkOnboarding();
    })

      // Fallback offline
      S.logado=true;
      S.perfNome='Visitante';
      render();
      toast('Modo visitante ativado 🎮');
      checkOnboarding();
    });
}

function doCadastro(){
  var nm=document.getElementById('cad-nome');
  var em=document.getElementById('cad-email');
  var sn=document.getElementById('cad-senha');
  if(!nm||!em||!sn||!nm.value.trim()||!em.value.trim()||!sn.value.trim()){S.loginErro='Preencha todos os campos.';render();return;}
  if(sn.value.trim().length<6){S.loginErro='Senha precisa ter mínimo 6 caracteres.';render();return;}
  S.loginErro='';
  var auth=_initFirebase();
  auth.createUserWithEmailAndPassword(em.value.trim(),sn.value.trim())
    .then(function(cred){
      return cred.user.updateProfile({displayName:nm.value.trim()}).then(function(){return cred.user;});
    })
    .then(function(user){
      S.logado=true;
      S.fbUser=user;
      S.perfNome=nm.value.trim();
      S.perfEmail=em.value.trim();
      render();
      toast('Conta criada! Bem-vindo '+S.perfNome+' ⚽');
      checkOnboarding();
    })
    .catch(function(err){
      var msgs={
        'auth/email-already-in-use':'Este email já está cadastrado.',
        'auth/invalid-email':'Email inválido.',
        'auth/weak-password':'Senha muito fraca. Use pelo menos 6 caracteres.',
        'auth/operation-not-allowed':'Cadastro desativado temporariamente.'
      };
      S.loginErro=msgs[err.code]||'Erro ao criar conta. Tente novamente.';
      render();
    });
}

function doLogout(){
  var auth=_initFirebase();
  auth.signOut().then(function(){
    S.logado=false;
    S.fbUser=null;
    S.perfNome='Você';
    S.perfEmail='';
    closeModal();
    render();
    toast('Até logo! 👋');
  });
}

function doLoginGoogle(){
  var auth=_initFirebase();
  var provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(function(cred){
      S.logado=true;
      S.fbUser=cred.user;
      S.perfNome=cred.user.displayName||'Jogador';
      S.perfEmail=cred.user.email;
      if(cred.user.photoURL) S.perfFoto=cred.user.photoURL;
      render();
      toast('Bem-vindo, '+S.perfNome+'! 🎉');
      checkOnboarding();
    })
    .catch(function(err){
      if(err.code!=='auth/popup-closed-by-user'){
        toast('Erro com Google. Tente email/senha.');
      }
    });
}

  var feed=S.feedTab==='todos'?D.feed:D.feed.filter(function(p){return p.tipo===S.feedTab;});
  var o='<div class="fu">';

  // Stories
  o+='<div class="stor-row">';
  D.stories.forEach(function(s){
    var click=s.add?'openPostModal()':'setStVisto('+s.id+')';
    var ring=s.add?'':S.stVisto[s.id]?'background:var(--muted2)':'background:linear-gradient(135deg,'+s.cor+')';
    o+='<div class="stor" onclick="'+click+'"><div class="stor-ring" style="'+ring+'"><div class="stor-av">'+s.av+'</div></div>';
    o+='<span class="stor-lb" style="color:'+(S.stVisto[s.id]?'var(--muted)':'var(--text2)')+'">'+esc(s.user)+'</span></div>';
  });
  o+='</div>';

  // Tabs
  o+='<div class="ftabs">';
  TABS.forEach(function(t){o+='<button class="ftab'+(S.feedTab===t.id?' a':'')+'" onclick="setFeedTab(\''+t.id+'\')">'+t.l+'</button>';});
  o+='</div>';

  // Posts
  feed.forEach(function(post){
    var cor=TCOR[post.tipo]||'#4E6080';
    var curtido=S.curtidos[post.id];
    var salvo=S.salvos[post.id];
    var coment=S.comentando===post.id;
    var playing=S.vplay===post.id;
    var midia='';
    if(post.midia){
      if(post.midia.tipo==='video'){
        if(playing){
          midia='<div class="post-vid" style="flex-direction:column;gap:7px;cursor:pointer" onclick="toggleVideo('+post.id+')">'+
            '<div style="font-size:48px;animation:pulse 1.5s infinite">'+post.midia.thumb+'</div>'+
            '<span style="font-size:12px;font-weight:700">Reproduzindo...</span>'+
            '<div style="width:78%;height:3px;background:var(--bord);border-radius:99px;margin-top:3px"><div style="width:38%;height:100%;background:var(--green);border-radius:99px"></div></div></div>';
        }else{
          midia='<div class="post-vid" onclick="toggleVideo('+post.id+')">'+
            '<div style="font-size:54px">'+post.midia.thumb+'</div>'+
            '<div class="play-ic">▶️</div>'+
            '<div class="vid-dur">'+post.midia.dur+'</div>'+
            '<div class="vid-views">👁 '+(post.midia.views||0).toLocaleString('pt-BR')+'</div></div>';
        }
      }else if(post.midia.tipo==='fotos'&&post.midia.fotos){
        var fs=post.midia.fotos;
        if(fs.length===1){
          midia='<div style="border-radius:14px;overflow:hidden;margin-bottom:10px;background:var(--surf);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:64px">'+fs[0]+'</div>';
        }else{
          midia='<div class="pgrid">';
          fs.slice(0,4).forEach(function(f,i){midia+='<div class="pcell">'+f+(i===3&&fs.length>4?'<div class="pmore">+'+(fs.length-4)+'</div>':'')+'</div>';});
          midia+='</div>';
        }
      }
    }
    o+='<div class="post">';
    o+='<div class="post-hd">'+av(post.av,40,cor)+
      '<div style="flex:1;min-width:0;margin-left:1px"><div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap"><span class="post-name">'+esc(post.user)+'</span>'+pl(TLBL[post.tipo],cor)+'</div>'+
      '<div class="post-meta">'+esc(post.time)+' · '+post.hora+'</div></div>'+
      '<button style="background:none;border:none;color:var(--muted);font-size:19px;padding:0 3px;cursor:pointer">···</button></div>';
    o+='<p class="post-txt">'+esc(post.txt)+'</p>';
    o+=midia;
    o+='<div class="pacts">'+
      '<button class="pa" onclick="toggleCurtir('+post.id+')" style="color:'+(curtido?'var(--red)':'var(--muted)')+'"><span class="pi">'+(curtido?'❤️':'🤍')+'</span>'+(post.likes+(curtido?1:0))+'</button>'+
      '<button class="pa" onclick="openComments('+post.id+')" style="color:var(--muted)"><span class="pi">💬</span>'+post.coments+'</button>'+
      '<button class="pa"><span class="pi">↗️</span>Compartilhar</button>'+
      '<div style="flex:1"></div>'+
      '<button class="pa" onclick="toggleSalvar('+post.id+')" style="color:'+(salvo?'var(--gold)':'var(--muted)')+'"><span class="pi">'+(salvo?'🔖':'🏷️')+'</span></button>'+
      '</div>';
    if(coment){
      o+='<div class="cbox"><div class="crow">'+av('🧑',28)+
        '<input class="cinput" placeholder="Adicionar comentário..."><button class="csend">↑</button></div></div>';
    }
    o+='</div>';
  });
  o+='</div>';
  return o;
}

/* ── JOGADORES ──────────────────────────────────── */
function screenJogadores(){
  if(S.jCriar)return screenCriarPerfil();
  if(S.jSel)return screenJogadorDetalhe(S.jSel);
  var POS=['Todos','GOL','ZAG','LAT','VOL','MEI','ATA','PNT','JUI'];
  var NIV=['Todos','Iniciante','Intermediário','Avançado','Profissional'];
  var filtrados=D.jogadores.filter(function(j){
    return(S.jFP==='Todos'||j.pos===S.jFP)&&(S.jFN==='Todos'||j.nivel===S.jFN)&&
      j.nome.toLowerCase().indexOf(S.jBusca.toLowerCase())>=0;
  });
  // Split jogadores e árbitros para exibição
  var somenteJogadores = filtrados.filter(function(j){ return j.pos !== 'JUI'; });
  var arbitros = filtrados.filter(function(j){ return j.pos === 'JUI'; });
  var o='<div class="fu" style="padding:0 14px">';
  o+='<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 13px"><span class="stl">Jogadores</span><button class="btn bp bsm" onclick="S.jCriar=true;render()">+ Criar Perfil</button></div>';
  o+='<div class="fg"><input class="fi" id="jb" value="'+esc(S.jBusca)+'" placeholder="🔍 Buscar jogadores..."></div>';
  o+='<div class="sr" style="margin-bottom:5px">';
  POS.forEach(function(f){o+='<button style="flex-shrink:0;border-radius:99px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;background:'+(S.jFP===f?'var(--green)':'var(--card)')+';color:'+(S.jFP===f?'var(--bg)':'var(--text2)')+';border:1px solid '+(S.jFP===f?'var(--green)':'var(--bord)')+'" onclick="setJFP(\''+f+'\')">'+f+'</button>';});
  o+='</div><div class="sr" style="margin-bottom:13px">';
  NIV.forEach(function(f){o+='<button style="flex-shrink:0;border-radius:99px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;background:'+(S.jFN===f?'var(--gold)':'var(--card)')+';color:'+(S.jFN===f?'var(--bg)':'var(--text2)')+';border:1px solid '+(S.jFN===f?'var(--gold)':'var(--bord)')+'" onclick="setJFN(\''+f+'\')">'+f+'</button>';});
  o+='</div>';
  o+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:800;font-size:12px;text-transform:uppercase">🏆 Ranking</span><span style="color:var(--muted);font-size:12px">'+filtrados.length+' jogadores</span></div>';
  // PODIUM (only when no filters active and no search)
  if(S.jFP==='Todos'&&S.jFN==='Todos'&&!S.jBusca){
    var top3=[
      {j:D.jogadores[1],rank:2,h:68,cor:'#A8B5CC'},
      {j:D.jogadores[0],rank:1,h:90,cor:'#FFBE00'},
      {j:D.jogadores[6],rank:3,h:52,cor:'#FF7043'}
    ];
    o+='<div class="podium">';
    top3.forEach(function(p){
      var pts=(p.j.gols*2+p.j.assist);
      o+='<div class="pod-slot">';
      o+='<div style="width:'+(p.rank===1?60:50)+'px;height:'+(p.rank===1?60:50)+'px;border-radius:50%;background:var(--surf);border:3px solid '+p.cor+';display:flex;align-items:center;justify-content:center;font-size:'+(p.rank===1?26:21)+'px">'+p.j.av+'</div>';
      o+='<div class="pod-nm" style="color:'+(p.rank===1?'var(--text)':'var(--text2)')+'">'+p.j.nome.split(' ')[0]+'</div>';
      o+='<div class="pod-pt" style="color:'+p.cor+'">'+pts+' pts</div>';
      o+='<div class="pod-bar" style="height:'+p.h+'px;background:linear-gradient(180deg,'+p.cor+'40,'+p.cor+'18);border:1px solid '+p.cor+'55;border-bottom:none">'+['🥇','🥈','🥉'][p.rank-1]+'</div>';
      o+='</div>';
    });
    o+='</div>';
  }
  // Lista de jogadores (excluindo árbitros)
  var totalJog = somenteJogadores.length;
  o+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><span style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted)">Jogadores</span><span style="color:var(--muted);font-size:11px">'+totalJog+' encontrados</span></div>';
  somenteJogadores.forEach(function(j,i){
    o+='<div class="ri tap" onclick="openJogador('+j.id+')">';
    o+='<span style="color:'+(i<3?'var(--gold)':'var(--muted)')+';font-weight:900;font-size:14px;width:20px;text-align:center;flex-shrink:0">'+(i<3?['🥇','🥈','🥉'][i]:(i+1)+'º')+'</span>';
    o+=av(j.av,42,i<3?'var(--gold)':'');
    o+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+esc(j.nome)+'</div><div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">'+pl(j.pos,'#00F082')+pl(j.nivel,'#FFBE00')+'</div></div>';
    o+='<div style="text-align:right;flex-shrink:0">'+stars(j.nota,10)+'<div style="color:var(--muted);font-size:11px;margin-top:3px">'+j.gols+'⚽ '+j.assist+'🎯</div></div></div>';
  });
  if(totalJog===0){o+='<div class="empty" style="padding:16px 0">Nenhum jogador encontrado.</div>';}

  // Seção de árbitros
  if(S.jFP==='Todos'||S.jFP==='JUI'){
    var arbs = S.jFP==='JUI' ? arbitros : D.jogadores.filter(function(j){return j.pos==='JUI'&&(S.jFN==='Todos'||j.nivel===S.jFN)&&j.nome.toLowerCase().indexOf(S.jBusca.toLowerCase())>=0;});
    o+='<div style="margin:20px 0 11px;display:flex;justify-content:space-between;align-items:center">';
    o+='<div style="display:flex;align-items:center;gap:7px"><span style="font-size:16px">🟡</span><span style="font-size:12px;font-weight:800;text-transform:uppercase;color:var(--gold);letter-spacing:.5px">Árbitros da Comunidade</span></div>';
    o+=pl(arbs.length+' disponíveis','#FFBE00')+'</div>';
    if(arbs.length===0){o+='<div class="empty" style="padding:12px 0">Nenhum árbitro encontrado.</div>';}
    arbs.forEach(function(j){
      var ref=j.juiz;
      var nivelCor={Iniciante:'#00D4C8',Intermediário:'#4D9EFF',Avançado:'#FFBE00',Profissional:'#00F082'}[j.nivel]||'#4D9EFF';
      o+='<div class="ri tap" onclick="openJogador('+j.id+')" style="border-color:#FFBE0033;background:linear-gradient(135deg,rgba(255,190,0,.05),var(--card))">';
      o+='<div style="font-size:22px;width:28px;text-align:center;flex-shrink:0">🟡</div>';
      o+=av(j.av,42,'#FFBE00');
      o+='<div style="flex:1;min-width:0">';
      o+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-weight:700;font-size:13px">'+esc(j.nome)+'</span>'+pl('ÁRBITRO','#FFBE00')+'</div>';
      o+='<div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">'+pl(j.nivel,nivelCor)+(ref&&ref.disponivel?pl('Disponível','#00F082'):'')+'</div></div>';
      o+='<div style="text-align:right;flex-shrink:0">'+stars(j.nota,10)+'<div style="color:var(--muted);font-size:11px;margin-top:3px">'+(ref?ref.partidas:'0')+'📋</div></div></div>';
    });
  }
  o+='</div>';
  return o;
}
function screenCriarPerfil(){

  o+='<p style="color:var(--muted);font-size:13px;margin:0 0 18px">'+(isJuiz?'Faça parte da comunidade como árbitro e seja encontrado por times.':'Cadastre-se e seja encontrado por times da sua região.')+'</p>';

    o+='</div>';
  } else {

  }
  o+='<div class="card" style="margin:14px 0"><div class="fl" style="margin-bottom:11px">Escolha seu avatar</div><div style="display:flex;gap:8px;flex-wrap:wrap">';
  var avatars = isJuiz
    ? ['🟡','⚖️','🏁','📋','🎽','👔','🏆','⭐','🎯','💼']
    : ['⚽','🎯','🛡️','🧤','⚡','💥','🔥','🌀','👑','💎'];
  avatars.forEach(function(e){o+='<button style="width:42px;height:42px;border-radius:50%;background:var(--surf);border:2px solid var(--bord);font-size:21px;cursor:pointer">'+e+'</button>';});
  o+='</div></div>';
  o+='<button class="btn bp bfw" style="padding:12px 0;background:'+(isJuiz?'linear-gradient(135deg,#FFBE00,#FF7043)':'linear-gradient(135deg,var(--green),var(--teal))')+';color:var(--bg)" onclick="backJ();toast(\''+(isJuiz?'Perfil de árbitro criado! 🟡':'Perfil criado! ⚽')+'\')">'+(isJuiz?'Criar Perfil de Árbitro 🟡':'Criar Perfil ✓')+'</button></div>';

function screenJogadorDetalhe(j){

  var o='<div class="fu" style="padding:14px 14px">'+bb('backJ()');

  o+='<div style="text-align:center"><div style="color:var(--gold);font-weight:900;font-size:16px">'+j.gols+'</div><div style="color:var(--muted);font-size:11px">gols</div></div>';

  o+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:13px">';

    o+='<div class="scard"><div style="font-size:17px;margin-bottom:3px">'+s.ic+'</div><div style="color:'+s.c+';font-weight:900;font-size:17px">'+s.v+'</div><div class="slbl">'+s.l+'</div></div>';
  });
  o+='</div>';
  o+='<div class="card" style="margin-bottom:13px;padding:13px 14px">';
  [{l:'Posição',v:j.pos},{l:'Nível',v:j.nivel},{l:'Pé',v:j.pe},{l:'Altura',v:j.altura},{l:'Cidade',v:j.cidade}].forEach(function(inf){
    o+='<div style="display:flex;justify-content:space-between;margin-bottom:7px"><span style="color:var(--muted);font-size:13px">'+inf.l+'</span><span style="font-size:13px;font-weight:600">'+esc(inf.v)+'</span></div>';
  });
  o+='</div>';
  // Conquistas de jogador
  var cjog = D.conquistas.filter(function(c){ return c.tipo==='jogador'; });
  o+='<div class="card" style="margin-bottom:13px"><div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:11px;letter-spacing:.5px">Conquistas</div>';
  o+='<div class="bdg-grid">';
  cjog.forEach(function(c){
    o+='<div class="bdg"><div class="bdg-ic '+(c.on?'on':'off')+'" style="background:'+c.cor+'22;border-color:'+(c.on?c.cor:'var(--bord)')+';color:'+c.cor+'">'+c.ic+'</div>';
    o+='<div class="bdg-lb" style="color:'+(c.on?'var(--text2)':'var(--muted)')+'">'+c.nome+'</div></div>';
  });
  o+='</div></div>';
  if(S.jAv){
    o+='<div class="card glow" style="margin-bottom:13px"><div style="font-weight:700;margin:0 0 13px;font-size:14px">Avaliar '+esc(j.nome.split(' ')[0])+'</div>';
    o+='<div class="star-r">';
    for(var n=1;n<=5;n++)o+='<span class="star-big'+(n<=S.jES?' on':'')+'" onmouseenter="setJES('+n+')" onclick="setJES('+n+')">★</span>';
    o+='</div>';
    if(S.jES>0)o+='<p style="text-align:center;color:var(--text2);font-size:13px;margin-bottom:13px">'+['','Ruim 😕','Regular 😐','Bom 👍','Ótimo 🔥','Excelente! 🌟'][S.jES]+'</p>';
    o+='<div style="display:flex;gap:9px"><button class="btn bs" style="flex:1" onclick="S.jAv=false;render()">Cancelar</button><button class="btn bp" style="flex:1" onclick="S.jAv=false;toast(\'Avaliação enviada! ⭐\')">Enviar ✓</button></div></div>';
  }else{
    var isSeg=S.seguindo[j.id]||false;
    var segCount=(j.seg||0)+(isSeg?1:0);
    o+='<div style="display:flex;gap:9px;margin-bottom:11px">';
    o+='<button class="btn bp" style="flex:1" onclick="go(\'mensagens\')">💬 Mensagem</button>';
    o+='<button class="btn bs" style="flex:1;border-color:'+(isSeg?'var(--green)':'var(--bord)')+';color:'+(isSeg?'var(--green)':'var(--text)') +'" onclick="toggleSeguirJog('+j.id+')">'+(isSeg?'✓ Seguindo':'+ Seguir')+' ('+segCount+')</button>';
    o+='</div>';
    o+='<button class="btn bs bfw" onclick="S.jAv=true;render()">⭐ Avaliar jogador</button>';
  }
  o+='</div>';
  return o;

function screenTornDetalhe(t){
  var SCOR={aberto:'#00F082',andamento:'#FFBE00',encerrado:'#4E6080'};
  var SLBL={aberto:'Inscrições abertas',andamento:'Em andamento',encerrado:'Encerrado'};
  var pct=Math.round(t.inscritos/t.maxTimes*100);
  var o='<div class="fu" style="padding:14px 14px">'+bb('backTorn()');
  o+='<div style="border-radius:20px;background:linear-gradient(135deg,'+t.cor+'18,var(--card));border:1px solid '+t.cor+'33;padding:22px;text-align:center;margin-bottom:14px">';
  o+='<div style="font-size:56px;margin-bottom:8px;filter:drop-shadow(0 4px 14px '+t.cor+'44)">'+t.badge+'</div>';
  o+='<div style="font-weight:900;font-size:20px;margin-bottom:6px">'+esc(t.nome)+'</div>';
  o+='<div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap">'+pl(t.esporte,'#4D9EFF')+pl(SLBL[t.status],SCOR[t.status])+'</div></div>';
  o+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">';
  [{l:'Prêmio',v:t.premio,c:t.cor},{l:'Taxa de inscrição',v:'R$ '+t.preco,c:'var(--text)'},{l:'Data',v:t.data,c:'var(--text2)'},{l:'Times inscritos',v:t.inscritos+'/'+t.maxTimes,c:'var(--text)'}].forEach(function(s){
    o+='<div class="scard"><div class="slbl">'+s.l+'</div><div style="color:'+s.c+';font-weight:800;font-size:14px;margin-top:3px">'+s.v+'</div></div>';
  });
  o+='</div>';
  o+='<div class="card" style="margin-bottom:13px"><div class="slbl" style="margin-bottom:7px">Vagas ocupadas</div>';
  o+='<div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px">'+t.inscritos+' de '+t.maxTimes+' times</span><span style="font-weight:700;color:'+t.cor+'">'+pct+'%</span></div>';
  o+='<div class="torn-prog" style="height:10px"><div class="torn-prog-fill" style="width:'+pct+'%;background:'+t.cor+'"></div></div></div>';
  o+='<div class="card" style="margin-bottom:14px"><div class="slbl" style="margin-bottom:7px">Local</div>';
  o+='<div style="font-weight:700;font-size:14px;margin-bottom:2px">🏟️ '+esc(t.campo)+'</div>';
  o+='<div style="color:var(--muted);font-size:12px">Goiânia, GO</div></div>';
  // BRACKET
  if(t.bracket&&t.bracket.length>0){
    var roundNames=['Quartas','Semis','Final'];
    o+='<div style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);margin-bottom:9px;letter-spacing:.5px">Chaveamento</div>';
    o+='<div class="bracket-wrap"><div class="bracket">';
    t.bracket.forEach(function(round,ri){
      o+='<div class="bracket-col"><div class="brt">'+(roundNames[ri]||'R'+(ri+1))+'</div>';
      round.forEach(function(m){
        var g1=m.g1,g2=m.g2,decided=g1!==null&&g2!==null;
        var w1=decided&&g1>g2,w2=decided&&g2>g1;
        o+='<div class="bm">';
        o+='<div class="bm-t'+(w2?' el':'')+'"><span>'+esc(m.t1)+'</span><span class="bm-sc" style="color:'+(w1?'var(--green)':'var(--text2)')+'">'+( g1!==null?g1:'-')+'</span></div>';
        o+='<div class="bm-t'+(w1?' el':'')+'"><span>'+esc(m.t2)+'</span><span class="bm-sc" style="color:'+(w2?'var(--green)':'var(--text2)')+'">'+( g2!==null?g2:'-')+'</span></div>';
        o+='</div>';
      });
      o+='</div>';
    });
    o+='</div></div>';
  }
  if(t.status==='aberto'&&t.inscritos<t.maxTimes){
    o+='<button class="btn bp bfw blg" onclick="inscreverTorn()">Inscrever meu time — R$ '+t.preco+'</button>';
  }else if(t.status==='encerrado'){
    o+='<div class="card" style="text-align:center;padding:20px;border-color:rgba(255,190,0,.3);background:rgba(255,190,0,.05)">';
    o+='<div style="font-size:40px;margin-bottom:8px">🥇</div>';
    o+='<div style="font-weight:800;font-size:15px;color:var(--gold)">Leões do Cerrado</div>';
    o+='<div style="color:var(--muted);font-size:12px;margin-top:3px">Campeão do torneio</div></div>';
  }else{
    o+='<div class="card" style="text-align:center;padding:16px;background:rgba(77,158,255,.08);border-color:rgba(77,158,255,.25)"><div style="color:var(--blue);font-weight:700">🎮 Torneio em andamento</div></div>';
  }
  o+='</div>';
  return o;
}

  o+='<h3 style="font-weight:900;font-size:19px;margin:0 0 18px">🏆 Criar Torneio</h3>';

/* ── CAMPOS ─────────────────────────────────────── */
function screenCampos(){

  if(S.cEtapa==='confirmado')return screenCampoConfirmado();

  o+='<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 14px"><span class="stl">Campos Disponíveis</span><button class="btn bp bsm" onclick="S.cCadastr=true;render()">+ Cadastrar</button></div>';
  if(dest.length>0){
    o+='<div style="color:var(--pink);font-size:12px;font-weight:800;margin:0 0 9px;text-transform:uppercase;letter-spacing:.5px">🔥 Em destaque</div>';

      o+='<div class="card tap" style="display:flex;align-items:center;gap:11px;padding:13px;margin-bottom:9px;background:linear-gradient(135deg,rgba(255,77,141,.1),var(--card));border-color:rgba(255,77,141,.25)" onclick="openCampo('+c.id+')">';

      o+='<div style="text-align:right">'+pl('R$ '+c.preco+'/h','var(--pink)')+'<div style="color:var(--muted);font-size:10px;margin-top:3px">até '+c.promo.val+'</div></div></div>';
    });
  }
  D.campos.forEach(function(c){
    o+='<div class="card tap" style="margin-bottom:11px" onclick="openCampo('+c.id+')">';
    o+='<div class="mini-gal">'+c.fotos.slice(0,4).map(function(f){return'<div class="mg-c">'+f+'</div>';}).join('')+'</div>';
    o+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    o+='<div style="flex:1"><div style="font-weight:800;font-size:15px;margin-bottom:2px">'+esc(c.nome)+'</div><div style="color:var(--muted);font-size:12px;margin-bottom:5px">📍 '+esc(c.end)+'</div>'+stars(c.nota,11);
    if(c.promo)o+='<div style="margin-top:5px">'+pl('🔥 '+c.promo.desc,'var(--pink)')+'</div>';
    o+='</div><div style="text-align:right;flex-shrink:0;margin-left:11px"><div style="color:var(--green);font-weight:900;font-size:19px;margin-bottom:1px">R$ '+c.preco+'</div><div style="color:var(--muted);font-size:11px;margin-bottom:5px">por hora</div>'+pl(c.vagas+' vagas','#4D9EFF')+'</div>';
    o+='</div></div>';
  });
  o+='</div>';
  return o;
}

      o+=av(S.perfAv,36,'var(--green)');
      o+='<div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(S.perfNome)+'</div><div style="color:var(--muted);font-size:11px">Desde agora</div></div>';
      o+=pl('Mensalista','#00F082')+'</div>';
    }
    c.membros.forEach(function(m){

/* ── PULL TO REFRESH ────────────────────────────── */
(function() {
  var startY = 0, pulling = false, threshold = 65;
  var bar = function() { return document.getElementById('ptr-bar'); };
  document.addEventListener('touchstart', function(e) {
    var scr = document.getElementById('screen');
    if (scr && scr.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, {passive: true});
  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy > 0 && dy < 120) {
      var b = bar();
      if (b) { b.style.height = Math.min(dy * 0.5, 36) + 'px'; b.innerHTML = dy > threshold ? '🔄 Solte para atualizar' : '↓ Puxe para atualizar'; }
    }
  }, {passive: true});
  document.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    var dy = e.changedTouches[0].clientY - startY;
    var b = bar();
    if (b) b.style.height = '0';
    if (dy > threshold) { toast('Atualizando... 🔄'); setTimeout(function() { render(); toast('Atualizado! ✓'); }, 800); }
  });
})();

  o += '</div>';
  // Categories
  var cats = [
    {titulo:'⚽ Artilheiros', campo:'gols', unidade:'gols', cor:'#FFBE00'},
    {titulo:'🎯 Garçons', campo:'assist', unidade:'assist.', cor:'#4D9EFF'},
    {titulo:'📅 Mais jogos', campo:'jogos', unidade:'jogos', cor:'#00F082'},
  ];
  cats.forEach(function(cat) {
    var rank = D.jogadores.slice().sort(function(a,b){return b[cat.campo]-a[cat.campo];}).slice(0,5);
    var max = rank[0][cat.campo];
    o += '<div class="shd"><span class="stl">' + cat.titulo + '</span></div>';
    o += '<div class="card" style="margin-bottom:16px;padding:13px 14px">';
    rank.forEach(function(j, i) {
      var pct = Math.round(j[cat.campo] / max * 100);
      o += '<div style="display:flex;align-items:center;gap:9px;margin-bottom:' + (i < 4 ? '11px' : '0') + '">';
      o += '<span style="font-size:14px;width:20px;text-align:center;color:' + (i<3?'var(--gold)':'var(--muted)') + '">' + (i<3?['🥇','🥈','🥉'][i]:(i+1)+'º') + '</span>';
      o += av(j.av, 32);
      o += '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">' + esc(j.nome) + '</div>';
      o += '<div style="margin-top:4px;background:var(--surf);border-radius:99px;height:5px"><div style="width:' + pct + '%;height:5px;border-radius:99px;background:' + cat.cor + '"></div></div></div>';
      o += '<span style="color:' + cat.cor + ';font-weight:900;font-size:14px;flex-shrink:0">' + j[cat.campo] + '<span style="color:var(--muted);font-size:10px"> ' + cat.unidade + '</span></span></div>';
    });
    o += '</div>';
  });
  o += '</div>';
  return o;
}

/* ── SCREEN: HISTÓRICO ──────────────────────────── */
function screenHistorico() {
  var reservas = [
    {id:1, campo:'Arena Verde',    img:'🏟️',data:'Sáb 15/03',hora:'20:00',preco:120,status:'confirmada',jog:8},
    {id:2, campo:'Campo do Cerrado',img:'⛳',data:'Ter 11/03',hora:'19:00',preco:90, status:'realizada', jog:6},
    {id:3, campo:'Estádio Central',  img:'🏆',data:'Dom 09/03',hora:'09:00',preco:150,status:'realizada', jog:10},
    {id:4, campo:'Quadra do Parque', img:'🌿',data:'Sex 07/03',hora:'18:00',preco:70, status:'cancelada', jog:5},
  ];
  var sCor = {confirmada:'#00F082', realizada:'#4D9EFF', cancelada:'#FF4060'};
  var sLbl = {confirmada:'Confirmada ✅', realizada:'Realizada', cancelada:'Cancelada'};
  var o = '<div class="fu" style="padding:0 14px">';
  o += '<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 14px"><span class="stl">📅 Minhas Reservas</span></div>';
  // Stats
  o += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px">';
  [{l:'Total',v:reservas.length,c:'var(--text)'},{l:'Realizadas',v:reservas.filter(function(r){return r.status==='realizada';}).length,c:'#4D9EFF'},{l:'Gasto total',v:'R$ '+reservas.reduce(function(s,r){return s+r.preco;},0),c:'#00F082'}].forEach(function(s){
    o += '<div class="scard"><div style="color:' + s.c + ';font-weight:900;font-size:15px">' + s.v + '</div><div class="slbl">' + s.l + '</div></div>';
  });
  o += '</div>';
  reservas.forEach(function(r) {
    var cor = sCor[r.status];
    o += '<div class="card" style="margin-bottom:9px;padding:13px 14px">';
    o += '<div style="display:flex;align-items:center;gap:11px;margin-bottom:9px">';
    o += '<div style="width:44px;height:44px;border-radius:12px;background:var(--surf);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;font-size:22px">' + r.img + '</div>';
    o += '<div style="flex:1"><div style="font-weight:700;font-size:14px">' + esc(r.campo) + '</div>';
    o += '<div style="color:var(--muted);font-size:12px;margin-top:2px">📅 ' + r.data + ' · ' + r.hora + '</div></div>';
    o += pl(sLbl[r.status], cor) + '</div>';
    o += '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:9px;border-top:1px solid var(--bord)">';
    o += '<div style="display:flex;gap:14px"><span style="font-size:12px;color:var(--muted)">💰 R$ ' + r.preco + '</span><span style="font-size:12px;color:var(--muted)">👥 ' + r.jog + ' jogadores</span></div>';
    o += '<span style="font-size:12px;color:var(--muted)">R$ ' + (r.preco/r.jog).toFixed(2) + '/jog.</span></div>';
    if (r.status === 'realizada') {
      o += '<button class="btn bs bsm" style="width:100%;margin-top:9px" onclick="toast(\'Reserva repetida! 📅\')">🔁 Repetir reserva</button>';
    } else if (r.status === 'confirmada') {
      o += '<div style="display:flex;gap:7px;margin-top:9px">';
      o += '<button class="btn bs bsm" style="flex:1" onclick="toast(\'Link copiado! 🔗\')">📤 Compartilhar</button>';
      o += '<button class="btn bd bsm" style="flex:1" onclick="toast(\'Reserva cancelada.\')">Cancelar</button></div>';
    }
    o += '</div>';
  });
  o += '</div>';
  return o;
}

/* ── RATING INTERATIVO DE CAMPO ─────────────────── */
function openRatingCampo(campoId) {
  var c = null;
  for (var i = 0; i < D.campos.length; i++) { if (D.campos[i].id === campoId) { c = D.campos[i]; break; } }
  if (!c) return;
  S.ratingCampo = S.ratingCampo || {};
  var nota = S.ratingCampo[campoId] || 0;
  var criterios = ['Gramado','Limpeza','Infraestrutura','Atendimento','Custo-benefício'];
  var notas = S.ratingCampo['c'+campoId] || criterios.map(function(){return 0;});
  var o = '<div style="font-weight:800;font-size:16px;margin:0 0 5px">⭐ Avaliar ' + esc(c.nome) + '</div>';
  o += '<div style="color:var(--muted);font-size:12px;margin-bottom:16px">Compartilhe sua experiência com outros jogadores</div>';
  criterios.forEach(function(crit, ci) {
    o += '<div style="margin-bottom:13px"><div style="font-size:13px;font-weight:700;margin-bottom:7px">' + crit + '</div>';
    o += '<div style="display:flex;gap:7px">';
    for (var n = 1; n <= 5; n++) {
      var filled = n <= (notas[ci] || 0);
      o += '<button onclick="ratingSetCrit(' + campoId + ',' + ci + ',' + n + ')" style="width:36px;height:36px;border-radius:9px;font-size:20px;cursor:pointer;border:1.5px solid ' + (filled?c.cor:'var(--bord)') + ';background:' + (filled?c.cor+'22':'var(--surf)') + '">★</button>';
    }
    o += '</div></div>';
  });
  o += dv();
  o += '<div style="display:flex;gap:9px">';
  o += '<button class="btn bs" style="flex:1" onclick="closeModal()">Cancelar</button>';
  o += '<button class="btn bp" style="flex:1" onclick="closeModal();toast(\'Avaliação enviada! ⭐\')">Enviar avaliação</button></div>';
  showModal(o);
}
function ratingSetCrit(campoId, ci, nota) {
  if (!S.ratingCampo) S.ratingCampo = {};
  if (!S.ratingCampo['c'+campoId]) S.ratingCampo['c'+campoId] = [0,0,0,0,0];
  S.ratingCampo['c'+campoId][ci] = nota;
  openRatingCampo(campoId);
}

/* ── COMENTÁRIOS EXPANDIDOS ─────────────────────── */
var fakeComments = {
  1: [{av:'🎯',user:'Rafael Costa',   txt:'Jogo incrível mesmo! Estávamos 2x0 atrás e viramos 4x2!',hora:'1h'},
      {av:'🛡️',user:'Pedro Alves',   txt:'Time demais! Defesa muito sólida hoje.',               hora:'1h30'}],
  2: [{av:'🏟️',user:'Arena Verde',   txt:'Aproveite nosso desconto de 20% às terças!',           hora:'2h'},
      {av:'⚡',user:'Carlos Lima',    txt:'Vou reservar hoje mesmo!',                              hora:'2h30'}],
  3: [{av:'🔥',user:'Diego Nunes',   txt:'Quem se habilita? Prometo assistência garantida 😄',   hora:'5h'},
      {av:'🌀',user:'Bruno Carvalho',txt:'Pode me colocar, jogo bem pelo lado!',                 hora:'5h30'}],
  4: [{av:'💥',user:'Marcos Souza',  txt:'Que fase! Continue assim irmão 🔥',                    hora:'7h'},
      {av:'🧤',user:'João Mendes',   txt:'Vai continuar esse ritmo no torneio?',                 hora:'8h'}],
  5: [{av:'⛳',user:'Campo do Cerrado',txt:'Novo sistema LED já está funcionando 100%!',         hora:'9h'}],
  6: [{av:'🛡️',user:'Pedro Alves',  txt:'Força time! Campeonato tá chegando.',                  hora:'1d'}],
  7: [{av:'⚽',user:'Lucas Ferreira', txt:'Jogo de domingo vai ser épico!',                      hora:'1d'}],
};
function openComments(postId) {
  S.comentando = postId;
  var comments = fakeComments[postId] || [];
  var o = '<div style="font-weight:800;font-size:16px;margin:0 0 16px">💬 Comentários</div>';
  if (comments.length === 0) {
    o += '<div class="empty" style="padding:20px 0">Sem comentários ainda. Seja o primeiro! 💬</div>';
  } else {
    comments.forEach(function(cm) {
      o += '<div style="display:flex;gap:9px;margin-bottom:13px">';
      o += av(cm.av, 34);
      o += '<div style="flex:1;background:var(--surf);border-radius:0 13px 13px 13px;padding:9px 12px">';
      o += '<div style="font-weight:700;font-size:12px;margin-bottom:3px">' + esc(cm.user) + '<span style="color:var(--muted);font-weight:400;margin-left:7px">' + cm.hora + '</span></div>';
      o += '<div style="font-size:13px;line-height:1.5">' + esc(cm.txt) + '</div></div></div>';
    });
  }
  o += dv();
  o += '<div style="display:flex;gap:8px"><input id="cmt-inp" class="fi" style="flex:1;padding:9px 13px" placeholder="Adicionar comentário...">';
  o += '<button class="btn bp bsm" onclick="sendComment(' + postId + ')">Enviar</button></div>';
  showModal(o);
  setTimeout(function() {
    var el = document.getElementById('cmt-inp');
    if (el) el.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendComment(postId); });
  }, 50);
}
function sendComment(postId) {
  var inp = document.getElementById('cmt-inp');
  if (!inp || !inp.value.trim()) return;
  if (!fakeComments[postId]) fakeComments[postId] = [];
  fakeComments[postId].push({av: S.perfAv, user: S.perfNome, txt: inp.value, hora: 'agora'});
  for (var i = 0; i < D.feed.length; i++) { if (D.feed[i].id === postId) { D.feed[i].coments++; break; } }
  inp.value = '';
  openComments(postId);
  render();
}
